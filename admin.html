async function cargarFicha(fichaId){
  closeModal();
  if(!DB_OK)return;
  const r=await SB.get('fichas_ocupacionales',`select=*&id=eq.${fichaId}`);
  if(r&&r[0]){
    FO.fid=r[0].id;
    FO.data={a:r[0].seccion_a||{},b:r[0].seccion_b||{},c:r[0].seccion_c||{},d:r[0].seccion_d||{},e:r[0].seccion_e||{},f:r[0].seccion_f||{},g:r[0].seccion_g||{},h:r[0].seccion_h||{},i:r[0].seccion_i||{},j:r[0].seccion_j||{},k:r[0].seccion_k||{},l:r[0].seccion_l||{},m:r[0].seccion_m||{},n:r[0].seccion_n||{},r:r[0].seccion_r||{}};
    FO.sec='A';
    render();
  }
}

async function nuevaAtencion(){
  const p=gP(FO.pid);if(!p)return;
  // Precargar datos de la última ficha
  let ultimaFicha=null;
  if(DB_OK){
    const r=await SB.get('fichas_ocupacionales',`select=*&paciente_id=eq.${FO.pid}&order=created_at.desc&limit=1`);
    if(r&&r[0])ultimaFicha=r[0];
  }
  // Crear nueva ficha con datos precargados
  FO.fid=null;FO.sec='A';
  if(ultimaFicha){
    // Copiar datos de la última ficha
    FO.data={
      a:ultimaFicha.seccion_a||{},
      b:{...(ultimaFicha.seccion_b||{}),fecha_atencion:TD,tipo_eval:'PERIÓDICO',observacion:''},
      c:ultimaFicha.seccion_c||{},
      d:{descripcion:''},
      e:ultimaFicha.seccion_e||{},
      f:{hallazgos:{},observaciones:''},
      g:ultimaFicha.seccion_g||{},
      h:ultimaFicha.seccion_h||{},
      i:ultimaFicha.seccion_i||{},
      j:{categorias:[],observaciones:''},
      k:{diagnosticos:[]},
      l:{aptitud:'',observaciones:''},
      m:{estandar:[],medicas:''},
      n:ultimaFicha.seccion_n||{},
      r:ultimaFicha.seccion_r||{}
    };
    alert('✅ Nueva atención creada con datos precargados de la última ficha.\n\n📅 Fecha: Hoy\n📋 Tipo: PERIÓDICO\n\nLos datos del paciente, antecedentes y riesgos se mantienen.\nDiagnóstico, aptitud y resultados se reiniciaron.');
  }else{
    preloadFichaData(p);
    alert('➕ Nueva atención creada desde cero.');
  }
  render();
}

async function saveFicha(){
  // Guardar sección actual
  saveFichaSection();
  // También guardar médico si está visible
  const medNom=document.getElementById('fo_medico')?.value;
  const medCod=document.getElementById('fo_codmed')?.value;
  if(medNom||medCod) FO.data.n={medico:medNom||'',codigo:medCod||''};
  
  const d=FO.data;
  
  // Debug: verificar que los datos están en memoria
  console.log('📋 Guardando ficha. Sección A:', JSON.stringify(d.a||{}).substring(0,200));
  console.log('📋 FO.fid:', FO.fid, 'FO.pid:', FO.pid);
  
  if(!d.a||!d.a.ap1){
    console.warn('⚠️ Sección A vacía. Datos actuales:', d);
  }
  
  const payload={
    paciente_id:FO.pid,medico_id:S.u?.id,fecha:d.b?.fecha_atencion||TD,tipo_eval:d.b?.tipo_eval||'INGRESO',
    seccion_a:d.a||{},seccion_b:d.b||{},seccion_c:d.c||{},seccion_d:d.d||{},seccion_e:d.e||{},seccion_f:d.f||{},seccion_g:d.g||{},seccion_h:d.h||{},seccion_i:d.i||{},seccion_j:d.j||{},seccion_k:d.k||{},seccion_l:d.l||{},seccion_m:d.m||{},seccion_n:d.n||{},seccion_r:d.r||{},
    aptitud:d.l?.aptitud||'',estado:'guardado',updated_at:new Date().toISOString()
  };
  if(DB_OK){
    try{
      if(FO.fid){
        const r=await SB.patch('fichas_ocupacionales',payload,`id=eq.${FO.fid}`);
        if(!r){alert('❌ Error al actualizar la ficha en Supabase. Verifica la conexión.');return;}
      }else{
        const r=await SB.post('fichas_ocupacionales',payload);
        if(r&&r[0]){FO.fid=r[0].id;}
        else{alert('❌ Error al crear la ficha en Supabase. Verifica que la tabla fichas_ocupacionales exista.');return;}
      }
      alert('✅ Ficha guardada correctamente');
    }catch(e){alert('❌ Error: '+e.message);}
  }else{
    alert('⚠️ Sin conexión a Supabase. La ficha solo se guardó en memoria.');
  }
  render();
}

async function svEmpCli(eid){
  const nombre=document.getElementById('ec_nombre')?.value?.trim();
  if(!nombre){alert('El nombre de la empresa es obligatorio');return;}
  const data={
    nombre,
    ruc:document.getElementById('ec_ruc')?.value?.trim()||'',
    ciiu:document.getElementById('ec_ciiu')?.value?.trim()||'',
    direccion:document.getElementById('ec_dir')?.value?.trim()||'',
    telefono:document.getElementById('ec_tel')?.value?.trim()||'',
    contacto:document.getElementById('ec_contacto')?.value?.trim()||'',
  };
  if(!S.empresas_cli)S.empresas_cli=[];
  if(eid){
    const i=S.empresas_cli.findIndex(e=>e.id===eid);
    if(i>-1){
      S.empresas_cli[i]={...S.empresas_cli[i],...data};
      if(DB_OK)await SB.patch('empresas',data,`id=eq.${eid}`);
    }
  }else{
    if(DB_OK){
      const r=await SB.post('empresas',data);
      if(r&&r[0])S.empresas_cli.push({id:r[0].id,...data});
      else S.empresas_cli.push({id:gid(),...data});
    }else{
      S.empresas_cli.push({id:gid(),...data});
    }
  }
  closeModal();render();
  alert(`✅ Empresa ${eid?'actualizada':'registrada'}: ${nombre}`);
}

async function delEmpCli(eid){
  const e=(S.empresas_cli||[]).find(x=>x.id===eid);
  if(!e)return;
  if(!confirm(`¿Eliminar la empresa "${e.nombre}"?`))return;
  S.empresas_cli=S.empresas_cli.filter(x=>x.id!==eid);
  if(DB_OK)await SB.del('empresas',`id=eq.${eid}`);
  render();
  alert(`✅ Empresa eliminada: ${e.nombre}`);
}

function applyTheme(){
  const tc=getThemeCfg();
  // Si tiene paletaId, aplicar paleta completa
  const paleta=tc.paletaId?_getPaletas().find(p=>p.id===tc.paletaId):null;
  const src=paleta||tc;
  if(!src.a&&!src.primary)return;
  const r=document.documentElement.style;
  if(src.bg||src.bg){r.setProperty('--bg',src.bg);r.setProperty('--ci',src.bg);}
  if(src.c1||src.card){r.setProperty('--c1',src.c1||src.card);r.setProperty('--c2',src.c2||src.card);}
  if(src.bd)r.setProperty('--bd',src.bd);
  if(src.t)r.setProperty('--t',src.t);
  if(src.tm){r.setProperty('--tm',src.tm);r.setProperty('--td',src.tm);}
  if(src.a||src.primary){const c=src.a||src.primary;r.setProperty('--a',c);r.setProperty('--as',c+'1f');}
  if(src.tl||src.secondary){const c=src.tl||src.secondary;r.setProperty('--tl',c);r.setProperty('--tls',c+'1f');}
  if(src.ok){r.setProperty('--ok',src.ok);r.setProperty('--oks',src.ok+'1f');}
  if(src.w||src.warn){const c=src.w||src.warn;r.setProperty('--w',c);r.setProperty('--ws',c+'1f');}
  if(src.er)r.setProperty('--er',src.er);
  // Si hay colores manuales que sobreescriben
  if(tc.primary&&!paleta){r.setProperty('--a',tc.primary);r.setProperty('--as',tc.primary+'1f');}
  if(tc.secondary&&!paleta){r.setProperty('--tl',tc.secondary);r.setProperty('--tls',tc.secondary+'1f');}
}

async function importGSheet(){
  const url=document.getElementById('gs_url').value.trim();
  if(!url){alert('Pega la URL del Google Sheet');return;}
  if(!confirm('¿Importar datos del Google Sheet?\nSe agregarán como pacientes y citas nuevas (no se duplican por cédula).'))return;
  try{
    const r=await fetch(url);if(!r.ok){alert('❌ Error de conexión');return;}
    const csv=await r.text();
    const rows=csv.split('\n').map(r=>r.split(',').map(c=>c.replace(/^"|"$/g,'').trim()));
    if(rows.length<2){alert('Sheet vacío');return;}
    const hdr=rows[0].map(h=>h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
    const fi=(keys)=>hdr.findIndex(h=>keys.some(k=>h.includes(k)));
    const iNom=fi(['nombre','name']);const iCed=fi(['cedula','ci','id']);
    const iEmp=fi(['empresa','company']);const iCiu=fi(['ciudad','city']);
    const iEmail=fi(['email','correo','mail']);const iFecha=fi(['fecha','date']);
    const iHora=fi(['hora','time','turno']);

    if(iNom===-1||iEmp===-1){alert('❌ No se encontraron columnas "nombre" y "empresa" en el Sheet.\nEncabezados detectados: '+rows[0].join(', '));return;}

    let added=0,skipped=0;
    for(let i=1;i<rows.length;i++){
      const r=rows[i];if(!r[iNom])continue;
      const ced=iCed>-1?r[iCed]:'';
      // Skip if already exists by cedula
      if(ced&&S.pts.find(p=>p.cedula===ced)){skipped++;continue;}
      const pd={nombre:r[iNom],cedula:ced,empresa:r[iEmp]||'',ciudad:iCiu>-1?r[iCiu]:'',email:iEmail>-1?r[iEmail]:'',telefono:'',genero:'',direccion:'',cargo:'',fecha_nacimiento:''};
      await addP(pd);
      // If has date, create appointment
      if(iFecha>-1&&r[iFecha]){
        const pid=S.pts.find(p=>p.cedula===ced)?.id;
        if(pid){await addA({pid,tipo:'Laboratorio',fecha:r[iFecha],hora:iHora>-1?r[iHora]:'07:30',origen:'gsheet'});}
      }
      added++;
    }
    alert(`✅ Importación completada\n👤 Pacientes agregados: ${added}\n⏭️ Ya existían (omitidos): ${skipped}`);
    render();
  }catch(e){alert('❌ Error: '+e.message);}
}

// ═══ AUTO-REFRESH INTELIGENTE (solo render si hay cambios) ═══
let _refreshTimer=null;
let _lastDataHash='';

function _dataHash(pts,apt,ord){
  // Generar un hash simple basado en cantidad y últimos IDs
  const p=pts?pts.length:0;
  const a=apt?apt.length:0;
  const o=ord?ord.length:0;
  const lastPid=pts&&pts.length>0?pts[pts.length-1].id:'';
  const lastAid=apt&&apt.length>0?apt[apt.length-1].id:'';
  const lastOid=ord&&ord.length>0?ord[ord.length-1].id:'';
  // También incluir estados para detectar cambios de estado
  const estados=apt?apt.map(x=>x.estado).join(''):'';
  const ordEstados=ord?ord.map(x=>x.estado).join(''):'';
  return`${p}-${a}-${o}-${lastPid}-${lastAid}-${lastOid}-${estados}-${ordEstados}`;
}

async function autoRefresh(){
  if(!DB_OK||!S.u)return;
  try{
    const [pts,apt,ord]=await Promise.all([
      SB.get('pacientes','select=*&order=created_at'),
      SB.get('citas','select=*&order=created_at'),
      SB.get('ordenes','select=*&order=created_at'),
    ]);
    if(pts===null)return;
    
    // Verificar si hay cambios reales
    const newHash=_dataHash(pts,apt,ord);
    const hasChanges=newHash!==_lastDataHash;
    
    // Siempre actualizar datos en memoria
    S.pts=pts.map(p=>({id:p.id,nombre:p.nombre,cedula:p.cedula,telefono:p.telefono||'',email:p.email||'',genero:p.genero||'',direccion:p.direccion||'',ciudad:p.ciudad||'',empresa:p.empresa,cargo:p.cargo||'',fecha_nacimiento:p.fecha_nacimiento||'',created_at:p.created_at||''}));
    S.apt=apt?apt.map(a=>({id:a.id,pid:a.pid,tipo:a.tipo,fecha:a.fecha,hora:a.hora,estado:a.estado,asistio:a.asistio,exAsig:a.ex_asig,origen:a.origen||'admin'})):S.apt;
    S.ord=ord?ord.map(o=>({id:o.id,aid:o.aid,pid:o.pid,cat:o.cat,exams:o.exams||[],parte:o.parte||'',proy:o.proy||'',estado:o.estado})):S.ord;
    
    _lastDataHash=newHash;
    
    // Solo hacer render si hay cambios Y el usuario no está ocupado
    if(hasChanges&&!_isUserBusy()){
      render();
    }
  }catch(e){console.warn('AutoRefresh error:',e);}
}

function _isUserBusy(){
  if(document.querySelector('.mo'))return true;
  if(document.getElementById('bloq_modal_overlay'))return true;
  const ae=document.activeElement;
  if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT'))return true;
  return false;
}
function startAutoRefresh(){if(_refreshTimer)clearInterval(_refreshTimer);_refreshTimer=setInterval(autoRefresh,5000);}
function stopAutoRefresh(){if(_refreshTimer){clearInterval(_refreshTimer);_refreshTimer=null;}}

          ${sugerido==='completado'?'<span style="font-size:9px;background:rgba(255,255,255,.3);padding:2px 6px;border-radius:4px;margin-left:6px">✨ Sugerido</span>':''}
        </button>
        <button class="btn bg" style="text-align:left;padding:10px 14px" onclick="closeModal();_enviarWA('${aid}','confirmacion')">
          ✅ Confirmación de registro
        </button>
      </div>
    </div>
    <div class="mft"><button class="btn bg" onclick="closeModal()">Cancelar</button></div>`);
    return;
  }
  _enviarWA(aid,tipo);
}

function _enviarWA(aid,tipo){
  const a=S.apt.find(x=>x.id===aid);if(!a)return;
  const p=gP(a.pid);if(!p)return;
  const ec=getEmpCfg();
  const ords=gAO(aid);
  const tel=p.telefono?p.telefono.replace(/\D/g,''):'';
  if(!tel||tel.length<7){alert('⚠️ Este paciente no tiene número de celular registrado');return;}

  let num=tel;
  if(num.startsWith('0'))num='593'+num.slice(1);
  if(!num.startsWith('593'))num='593'+num;

  const _fp=a.fecha.split('-');
  const fecha=new Date(+_fp[0],+_fp[1]-1,+_fp[2]);
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const fechaStr=`${dias[fecha.getDay()]} ${fecha.getDate()} de ${meses[fecha.getMonth()]} ${fecha.getFullYear()}`;
  const empresa=a.empresa||p.empresa||'';

  // Detectar exámenes
  const labOrd=ords.filter(o=>o.cat==='laboratorio');
  const rxOrd=ords.filter(o=>o.cat==='radiologia');
  const fichaOrd=ords.find(o=>o.cat==='ficha_ocupacional');
  const ecoOrd=ords.find(o=>o.cat==='ecografia');
  const ekgOrd=ords.find(o=>o.cat==='electrocardiograma');
  const espOrd=ords.find(o=>o.cat==='espirometria');
  const audOrd=ords.find(o=>o.cat==='audiometria');
  const tieneAyuno=labOrd.length>0;

  const _dir=ec.direccion?`📍 *Dirección:* ${ec.direccion}\n`:'';
  const _maps=ec.maps_url?`📌 *Ubicación:* ${ec.maps_url}\n`:'';
  const _wa=ec.wa_phone?`📱 *Contacto:* ${ec.wa_phone}\n`:'';
  const _cedula=`• Traer *cédula de identidad original*\n`;
  const _antes=`• Presentarse *15 minutos antes*\n`;

  let msg='';

  if(tipo==='examenes'){
    // Construir lista de exámenes

      listaEx+=`\n🦴 *RADIOGRAFÍA:*\n${rxOrd.map(o=>`• ${o.parte} — ${o.proy}`).join('\n')}${rxFecha}\n`;
    }
    if(ecoOrd){
      const ecoF=ecoOrd.fecha_prog?`\n   📅 Fecha: ${ecoOrd.fecha_prog}${ecoOrd.hora_prog?' a las '+ecoOrd.hora_prog:''}` :'';
      listaEx+=`\n🔊 *ECOGRAFÍA*${ecoF}\n`;
    }
    if(ekgOrd){
      const ekgF=ekgOrd.fecha_prog?`\n   📅 Fecha: ${ekgOrd.fecha_prog}${ekgOrd.hora_prog?' a las '+ekgOrd.hora_prog:''}` :'';
      listaEx+=`\n❤️ *ELECTROCARDIOGRAMA (EKG)*${ekgF}\n`;

      +_wa

      +`¡Le esperamos! 🙌`;
  }

  const url=`https://web.whatsapp.com/send?phone=${num}&text=${encodeURIComponent(msg)}`;

function sendWABulk(fecha){
  const citas=S.apt.filter(a=>a.fecha===fecha&&a.estado!=='cancelada');
  const conTel=citas.filter(a=>{const p=gP(a.pid);return p&&p.telefono&&p.telefono.replace(/\D/g,'').length>=7;});
  if(conTel.length===0){alert('⚠️ Ningún paciente tiene celular registrado');return;}
  
  const sinTel=citas.length-conTel.length;
  const ok=confirm(`📱 Se abrirá WhatsApp para ${conTel.length} pacientes.\n${sinTel>0?`⚠️ ${sinTel} pacientes no tienen celular.\n`:''}Cada mensaje se abre en una pestaña nueva.\n\n¿Continuar?`);
  if(!ok)return;

  conTel.forEach((a,i)=>{
    setTimeout(()=>sendWA(a.id,'recordatorio'),i*1500);
  });
}

async function downloadExcelAtendidos(periodo){
  // Cargar ExcelJS si no está cargado
  if(typeof ExcelJS==='undefined'){
    try{
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js';
        s.onload=resolve;s.onerror=reject;
        document.head.appendChild(s);
      });
    }catch(e){alert('❌ No se pudo cargar la librería de Excel. Verifica tu conexión a internet.');return;}
  }
  let desde='',hasta='';
  const hoy=new Date();
  if(periodo==='hoy'){
    desde=hasta=TD;
  }else if(periodo==='semana'){
    const d=new Date(hoy);d.setDate(d.getDate()-d.getDay());
    desde=d.toISOString().split('T')[0];hasta=TD;
  }else if(periodo==='mes'){
    desde=`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-01`;hasta=TD;
  }else if(periodo==='custom'){
    desde=document.getElementById('xl_desde')?.value||'';
    hasta=document.getElementById('xl_hasta')?.value||'';
    if(!desde||!hasta){alert('Selecciona fechas');return;}
  }else{
    desde='2020-01-01';hasta='2099-12-31';
  }

  // Pacientes con cita en el período
  const citas=S.apt.filter(a=>a.fecha>=desde&&a.fecha<=hasta&&a.estado!=='cancelada');
  const pidsCitas=new Set(citas.map(a=>a.pid));

  // Pacientes sin cita registrados en el período (por created_at si disponible)
  // Incluir todos los pacientes que no tienen cita pero están en el sistema
  // Para el reporte: combinar pacientes con cita + pacientes registrados hoy sin cita
  const ptsSinCita=S.pts.filter(p=>{
    if(pidsCitas.has(p.id))return false; // ya está en citas
    // Si tiene created_at verificar fecha, si no incluir en "hoy"
    if(p.created_at){
      const fc=p.created_at.split('T')[0];
      return fc>=desde&&fc<=hasta;
    }
    // Sin fecha de creación: incluir solo si el período es "hoy" o "todo"
    return periodo==='hoy'||periodo==='todo';
  });

  if(citas.length===0&&ptsSinCita.length===0){alert('No hay pacientes registrados en ese período');return;}

  // ═══ CONSTRUIR FILAS ═══
  const filasConCita=citas.sort((a,b)=>(a.fecha+a.hora).localeCompare(b.fecha+b.hora)).map(a=>{
    const p=gP(a.pid)||{};
    const ords=S.ord.filter(o=>o.aid===a.id);
    return{p,fecha:a.fecha,tipo:a.tipo,conCita:true,ords,empresa:a.empresa||p.empresa||''};
  });
  const filasSinCita=ptsSinCita.map(p=>{
    const fc=p.created_at?p.created_at.split('T')[0]:TD;
    // buscar ordenes por pid sin importar cita
    const ords=S.ord.filter(o=>o.pid===p.id);
    return{p,fecha:fc,tipo:'Sin cita',conCita:false,ords};
  });
  const todasFilas=[...filasConCita,...filasSinCita].sort((a,b)=>a.fecha.localeCompare(b.fecha));

  // ═══ DETECTAR COLUMNAS DINÁMICAS ═══
  // Fijas: LAB, RX, FICHA OCUPACIONAL
  // Dinámicas: solo si al menos 1 paciente las tiene
  const catsDinamicas=[
    {cat:'ecografia',label:'ECOGRAFÍA'},
    {cat:'electrocardiograma',label:'EKG'},
    {cat:'espirometria',label:'ESPIROMETRÍA'},
    {cat:'audiometria',label:'AUDIOMETRÍA'},
    {cat:'psico_ocupacional',label:'PSIC. OCUP.'},
    {cat:'psico_clinica',label:'PSIC. CLÍNICA'},
    {cat:'atencion_medica',label:'ATENCIÓN MÉDICA'},
  ];
  const colsDinamicas=catsDinamicas.filter(cd=>todasFilas.some(f=>f.ords.some(o=>o.cat===cd.cat)));

  // ═══ CREAR LIBRO ═══
  const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet('Reporte Facturación');

  // Columnas base + fijas + dinámicas
  const colsDef=[
    {header:'N°',key:'n',width:5},
    {header:'FECHA',key:'fecha',width:12},
    {header:'NOMBRE COMPLETO',key:'nombre',width:38},
    {header:'CÉDULA',key:'cedula',width:14},
    {header:'EMPRESA',key:'empresa',width:30},
    {header:'TIPO',key:'tipo',width:14},
    {header:'LABORATORIO',key:'lab',width:40},
    {header:'RADIOLOGÍA',key:'rx',width:20},
    {header:'FICHA OCUP.',key:'ficha',width:13},
    ...colsDinamicas.map(cd=>({header:cd.label,key:cd.cat,width:16})),
    {header:'CALIFICACIÓN',key:'calif',width:14}
  ];
  ws.columns=colsDef;

  // ═══ ESTILO ENCABEZADO ═══
  const hr=ws.getRow(1);
  hr.height=26;
  hr.eachCell((c,col)=>{
    // Colores por sección
    let color='FF2B6CB0'; // azul base
    if(col===7)color='FF0F766E'; // lab: verde
    if(col===8)color='FF7C3AED'; // rx: morado
    if(col===9)color='FF0369A1'; // ficha: azul oscuro
    if(col>9)color='FF92400E'; // dinámicas: naranja
    c.font={name:'Arial',bold:true,size:10,color:{argb:'FFFFFFFF'}};
    c.fill={type:'pattern',pattern:'solid',fgColor:{argb:color}};
    c.alignment={horizontal:'center',vertical:'middle',wrapText:true};
    c.border={top:{style:'thin',color:{argb:'FFCBD5E1'}},bottom:{style:'thin',color:{argb:'FFCBD5E1'}},left:{style:'thin',color:{argb:'FFCBD5E1'}},right:{style:'thin',color:{argb:'FFCBD5E1'}}};
  });

  // ═══ FILAS DE DATOS ═══
  todasFilas.forEach((item,idx)=>{
    const p=item.p;
    const ords=item.ords||[];

    // Lab: todos los exámenes de laboratorio
    const labOrd=ords.filter(o=>o.cat==='laboratorio');
    const labTxt=labOrd.length>0?labOrd.map(o=>(o.exams||[]).join(', ')).join(' / '):'-';

    // RX: parte + proyección
    const rxOrd=ords.filter(o=>o.cat==='radiologia');
    const rxTxt=rxOrd.length>0?rxOrd.map(o=>`${o.parte||''} ${o.proy||''}`.trim()).join(', '):'-';

    // Ficha ocupacional
    const fichaOrd=ords.find(o=>o.cat==='ficha_ocupacional'||o.cat==='atencion_medica');
    // Verificar si tiene ficha registrada en S.fichas
    const fichaReg=fichaOrd?S.fichas.find(f=>f.pid===p.id&&(f.estado==='finalizado'||f.estado==='completado')):null;
    const fichaTxt=!fichaOrd?'-':fichaReg?'✓':'✗';

    // Nombre formateado
    const nombreFmt=(p.nombre||'').replace('||',' ').toUpperCase();

    const rowData={
      n:idx+1,
      fecha:item.fecha,
      nombre:nombreFmt,
      cedula:p.cedula||'',
      empresa:(item.empresa||p.empresa||'').toUpperCase(),
      tipo:item.tipo||'-',
      lab:labTxt,
      rx:rxTxt,
      ficha:fichaTxt,
    };
    // Dinámicas
    colsDinamicas.forEach(cd=>{
      const o=ords.find(x=>x.cat===cd.cat);
      rowData[cd.cat]=o?'✓':'-';
    });
    // Calificación
    const califVal=item.conCita?(S.apt.find(a=>a.pid===p.id&&a.fecha===item.fecha)?.calificacion||null):null;
    const califCaritas=['','😞','😐','🙂','😊','🤩'];
    rowData.calif=califVal?`${califVal} ${califCaritas[califVal]}`:'-';

    const row=ws.addRow(rowData);
    // altura automática según contenido
    const isEven=idx%2===0;
    const bgBase=item.conCita?(isEven?'FFF8FAFC':'FFFFFFFF'):'FFFFF9E6';

    row.eachCell({includeEmpty:true},(c,col)=>{
      c.font={name:'Arial',size:10};
      c.fill={type:'pattern',pattern:'solid',fgColor:{argb:bgBase}};
      c.border={top:{style:'thin',color:{argb:'FFE2E8F0'}},bottom:{style:'thin',color:{argb:'FFE2E8F0'}},left:{style:'thin',color:{argb:'FFE2E8F0'}},right:{style:'thin',color:{argb:'FFE2E8F0'}}};
      // Centrar columnas cortas
      const centradas=[1,2,4,5,6,9,...colsDinamicas.map((_,i)=>10+i)];
      const wrapCols=[7,8]; // Lab y RX con wrap
      c.alignment={vertical:'middle',horizontal:centradas.includes(col)?'center':'left',wrapText:wrapCols.includes(col)};
      // Color ✓
      if(c.value==='✓'){c.font={name:'Arial',size:11,bold:true,color:{argb:'FF16A34A'}};}
      // Color ✗
      if(c.value==='✗'){c.font={name:'Arial',size:11,bold:true,color:{argb:'FFDC2626'}};}
      // Color - 
      if(c.value==='-'){c.font={name:'Arial',size:10,color:{argb:'FFCBD5E1'}};}
    });
  });

  // ═══ FILA TOTAL ═══
  const filaTot=ws.addRow({n:'',fecha:'',nombre:`TOTAL: ${todasFilas.length} pacientes`,cedula:'',empresa:'',tipo:'',lab:'',rx:'',ficha:''});
  filaTot.height=20;
  filaTot.eachCell({includeEmpty:true},c=>{
    c.font={name:'Arial',bold:true,size:10,color:{argb:'FF1E3A5F'}};
    c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFE8F0FE'}};
    c.border={top:{style:'medium',color:{argb:'FF2B6CB0'}},bottom:{style:'thin',color:{argb:'FFE2E8F0'}},left:{style:'thin',color:{argb:'FFE2E8F0'}},right:{style:'thin',color:{argb:'FFE2E8F0'}}};
  });

  // Congelar encabezado
  ws.views=[{state:'frozen',ySplit:1}];
  ws.autoFilter={from:'A1',to:{row:1,col:colsDef.length}};

  // ═══ DESCARGAR ═══
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  const periodoLabel=periodo==='hoy'?TD:periodo==='semana'?'semana':periodo==='mes'?'mes':`${desde}_${hasta}`;
  link.href=url;link.download=`reporte_facturacion_${periodoLabel}.xlsx`;
  link.click();URL.revokeObjectURL(url);
  showToast(`✅ Reporte descargado: ${todasFilas.length} pacientes`,'ok');
}

async function exportarTabla(tabla){
  if(!DB_OK){alert('⚠️ Sin conexión a Supabase');return;}
  const btn=event?.target;if(btn){btn.disabled=true;btn.textContent='⏳ Descargando...';}
  try{
    let datos=[];let offset=0;const limit=1000;
    while(true){
      const r=await SB.get(tabla,`select=*&order=created_at.desc&limit=${limit}&offset=${offset}`);
      if(!r||r.length===0)break;
      datos=datos.concat(r);offset+=limit;
      if(r.length<limit)break;
    }
    if(datos.length===0){alert('No hay datos en '+tabla);return;}
    const headers=Object.keys(datos[0]);
    let csv='\uFEFF'+headers.join(';')+'\n';
    datos.forEach(row=>{
      csv+=headers.map(h=>{
        let v=row[h];
        if(v===null||v===undefined)v='';
        if(typeof v==='object')v=JSON.stringify(v);
        return '"'+String(v).replace(/"/g,'""')+'"';
      }).join(';')+'\n';
    });
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const link=document.createElement('a');
    link.href=url;link.download=`${tabla}_${TDS}.csv`;
    link.click();URL.revokeObjectURL(url);
    alert(`✅ Descargado: ${datos.length} registros de ${tabla}`);
  }catch(e){alert('❌ Error: '+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent=btn.textContent.replace('⏳ Descargando...','📥');}}
}

async function eliminarRegistros(tabla,campo){
  const fecha=document.getElementById('gd_fecha')?.value;
  if(!fecha){alert('Selecciona una fecha límite primero');return;}
  if(!DB_OK){alert('⚠️ Sin conexión a Supabase');return;}
  if(!confirm(`🗑️ ELIMINAR registros de ${tabla} anteriores a ${fecha}.\n\nSe descargará un respaldo automáticamente antes de eliminar.\n\n¿Continuar?`))return;
  
  // Siempre descargar primero
  await exportarTabla(tabla);
  
  if(!confirm(`✅ Respaldo descargado.\n\n🗑️ ¿CONFIRMAR eliminación de ${tabla} anteriores a ${fecha}?\n\nEsta acción es PERMANENTE.`))return;
  
  const btn=event?.target;if(btn){btn.disabled=true;btn.textContent='⏳...';}
  try{
    await SB.del(tabla,`${campo||'created_at'}=lt.${fecha}`);
    if(tabla==='citas'){S.apt=S.apt.filter(a=>a.fecha>=fecha);}
    else if(tabla==='ordenes'){const citasAntiguas=S.apt.filter(a=>a.fecha<fecha).map(a=>a.id);S.ord=S.ord.filter(o=>!citasAntiguas.includes(o.aid));}
    alert(`✅ Registros de ${tabla} anteriores a ${fecha} eliminados.\n\n📥 El respaldo quedó en tu carpeta de descargas.`);
    render();
  }catch(e){alert('❌ Error: '+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent='🗑️ Eliminar';}}
}

async function descargarYEliminar(tabla,campo){
  const fecha=document.getElementById('gd_fecha')?.value;
  if(!fecha){alert('Selecciona una fecha límite primero');return;}
  if(!DB_OK){alert('⚠️ Sin conexión a Supabase');return;}
  if(!confirm(`📥🗑️ DESCARGAR Y ELIMINAR\n\nTabla: ${tabla}\nAnteriores a: ${fecha}\n\nPrimero se descarga, luego se elimina.\n¿Continuar?`))return;
  
  // Primero descargar
  await exportarTabla(tabla);
  
  // Luego eliminar
  if(!confirm(`✅ Descarga completada.\n\n🗑️ ¿Proceder a ELIMINAR los registros de ${tabla} anteriores a ${fecha}?`))return;
  await eliminarRegistros(tabla,campo);
}

loadAll().then(()=>{startAutoRefresh();});
