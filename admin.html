const SB={
  url:CFG.SUPABASE_URL,key:CFG.SUPABASE_KEY,
  async q(table,method,body,filters,range){
    let u=`${this.url}/rest/v1/${table}`;
    const h={'apikey':this.key,'Authorization':`Bearer ${this.key}`,'Content-Type':'application/json','Prefer':'return=representation'};
    if(range)h['Range']=range;
    if(filters)u+=`?${filters}`;
    if(method==='GET')delete h['Prefer'];
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(u,{method,headers:h,body:body?JSON.stringify(body):undefined,signal:ctrl.signal});
      clearTimeout(timer);
      if(!r.ok){console.warn('SB:',r.status);return null;}
      const text=await r.text();return text?JSON.parse(text):[];
    }catch(e){console.warn('SB offline:',e.message);return null;}
  },
  get(t,f,range){return this.q(t,'GET',null,f,range);},
  post(t,d){return this.q(t,'POST',d);},
  patch(t,d,f){return this.q(t,'PATCH',d,f);},
  del(t,f){return this.q(t,'DELETE',null,f);},
};

function login(){
  const c=document.getElementById('le')?.value,p=document.getElementById('lp')?.value;
  if(!c||!p){alert('Ingresa cédula y contraseña');return;}
  const u=S.usrs.find(u=>u.cedula===c&&u.pass===p);
  if(!u){alert('❌ Credenciales incorrectas');return;}
  if(!u.activo){alert('⚠️ Usuario desactivado. Contacta al administrador.');return;}
  S.u=u;S.v=(isA()||isE())?'dash':isL()?'lord':isR()?'rxord':isM()?'medord':isPsi()?'psiord':'dash';
  // Cargar firma desde Supabase ANTES de render
  if(DB_OK&&u.id){
    SB.get('usuarios',`select=firma,firma_cfg&id=eq.${u.id}`).then(r=>{
      if(r&&r[0]){
        if(r[0].firma)S.u.firma=r[0].firma;
        if(r[0].firma_cfg&&Object.keys(r[0].firma_cfg).length)S.u.firma_cfg=r[0].firma_cfg;
      }
      render();
    }).catch(()=>render());
  } else {
    render();
  }
}

function getOfflineQ(){try{return JSON.parse(localStorage.getItem('vw_offline_pts')||'[]');}catch{return[];}}
function saveOfflineQ(q){localStorage.setItem('vw_offline_pts',JSON.stringify(q));}
function addToOfflineQ(d){const q=getOfflineQ();q.push({...d,_ts:Date.now()});saveOfflineQ(q);console.warn('📴 Paciente guardado offline:',d.nombre);}
async function syncOfflineQ(){
  if(!DB_OK)return;
  const q=getOfflineQ();if(!q.length)return;
  console.log(`🔄 Sincronizando ${q.length} paciente(s) offline...`);
  const ok=[];
  for(const d of q){
    try{

// Google Calendar OAuth (para sincronización bidireccional)
const GCAL={
  CLIENT_ID:'',  // Pon tu Google Client ID aquí
  SCOPES:'https://www.googleapis.com/auth/calendar.events',
  token:null,
};
async function gcalAuth(){
  if(!GCAL.CLIENT_ID){
    alert('⚠️ Google Calendar OAuth no configurado.\n\nPasos para configurar:\n\n1. Ve a console.cloud.google.com\n2. Crea un proyecto nuevo\n3. Habilita "Google Calendar API"\n4. Crea credenciales OAuth 2.0\n5. Agrega tu dominio como origen autorizado\n6. Copia el Client ID y pégalo en GCAL.CLIENT_ID\n\nMientras tanto, se usa el link directo a Google Calendar.');
    return false;
  }
  return new Promise((resolve)=>{
    const authUrl=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${GCAL.CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.origin+window.location.pathname)}&response_type=token&scope=${encodeURIComponent(GCAL.SCOPES)}`;
    // Check if we have token from URL hash
    const hash=window.location.hash;
    if(hash.includes('access_token')){
      const params=new URLSearchParams(hash.substring(1));
      GCAL.token=params.get('access_token');
      window.location.hash='';
      resolve(true);
    }else{
      window.location.href=authUrl;
      resolve(false);
    }
  });
}

async function gcalSync(a){
  if(!GCAL.token){
    const ok=await gcalAuth();
    if(!ok){sGC(a);return;}
  }
  const p=gP(a.pid);
  const exams=gAO(a.id);
  let desc=`Tipo: ${a.tipo}\nPaciente: ${p?.nombre||''}\nCédula: ${p?.cedula||''}\nEmpresa: ${p?.empresa||''}`;
  if(exams.length>0){desc+='\n\nExámenes:';exams.forEach(o=>{if(o.cat==='radiologia')desc+=`\n- RX: ${o.parte} (${o.proy})`;else desc+=`\n- ${o.cat}: ${(o.exams||[]).join(', ')}`;});}
  const body={
    summary:`🏥 Cita ${a.tipo}: ${p?.nombre||''}`,
    description:desc,
    location:CFG.ADDR,
    start:{dateTime:`${a.fecha}T${a.hora}:00`,timeZone:'America/Guayaquil'},
    end:{dateTime:`${a.fecha}T${String(+a.hora.split(':')[0]+1).padStart(2,'0')}:${a.hora.split(':')[1]}:00`,timeZone:'America/Guayaquil'},
    reminders:{useDefault:false,overrides:[{method:'popup',minutes:60},{method:'popup',minutes:15}]}
  };
  try{
    const res=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',headers:{'Authorization':`Bearer ${GCAL.token}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(res.ok){const ev=await res.json();alert('✅ Evento creado en Google Calendar\n📅 '+ev.htmlLink);updA(a.id,{gcalId:ev.id});}
    else{const err=await res.json();if(err.error?.code===401){GCAL.token=null;gcalSync(a);}else alert('❌ Error: '+(err.error?.message||''));}
  }catch(e){alert('❌ Error de conexión. Usando link directo.');sGC(a);}
}

  const btn=document.querySelector('#_modal .btn.bp');
  if(btn){btn.setAttribute('onclick',`svP('${dup.id}')`);btn.textContent='Actualizar y registrar visita';}
  // Mostrar aviso
  const mbd=document.querySelector('#_modal .mbd');

function svP(eid){
  const ap1=(document.getElementById('mn_ap1').value||'').trim().toUpperCase();
  const ap2=(document.getElementById('mn_ap2').value||'').trim().toUpperCase();
  const n1=(document.getElementById('mn_n1').value||'').trim().toUpperCase();
  const n2=(document.getElementById('mn_n2').value||'').trim().toUpperCase();
  if(!ap1||!ap2||!n1){alert('⚠️ Primer Apellido, Segundo Apellido y Primer Nombre son obligatorios');return;}
  // Guardar como "AP1 AP2 || N1 N2" para compatibilidad
  const apellidos=ap2?ap1+' '+ap2:ap1;
  const nombres=n2?n1+' '+n2:n1;
  const d={nombre:apellidos+'||'+nombres,cedula:document.getElementById('mc').value,genero:document.getElementById('mg').value,telefono:document.getElementById('mt').value,email:document.getElementById('me').value,direccion:document.getElementById('md').value,ciudad:document.getElementById('mci').value,empresa:document.getElementById('mem').value,cargo:document.getElementById('mcg').value,fecha_nacimiento:document.getElementById('mfn').value};
  if(!d.empresa){alert('⚠️ La Empresa es obligatoria');return;}
  const empresaVisita=(document.getElementById('mem')?.value||'').trim().toUpperCase();
  closeModal();
  if(eid){
    // Paciente existente — actualizar datos Y crear nueva cita independiente
    d.id=eid;
    updP(d);
    // Crear cita nueva independiente con la empresa de esta visita
    const nuevaCita={pid:eid,tipo:'Consulta General',fecha:TD,hora:'07:00',empresa:empresaVisita||d.empresa};
    addA(nuevaCita);
    showToast('✅ Visita registrada correctamente','ok');
  }else{
    // Paciente nuevo — registrar y crear cita
    addP(d).then&&addP(d);
  }
}

async function svU(eid){
  const nombre=document.getElementById('un').value,cedula=document.getElementById('uc').value,pass=document.getElementById('upass').value,rol=document.getElementById('ur').value,apodo=document.getElementById('uapodo')?.value?.trim()||'';
  if(!nombre||!cedula){alert('Nombre y Cédula obligatorios');return;}
  if(eid){
    const i=S.usrs.findIndex(u=>u.id===eid);
    if(i>-1){
      if(S.usrs.find(u=>u.cedula===cedula&&u.id!==eid)){alert('Cédula ya existe');return;}
      S.usrs[i].nombre=nombre;S.usrs[i].cedula=cedula;S.usrs[i].rol=rol;S.usrs[i].apodo=apodo;if(pass)S.usrs[i].pass=pass;
      if(DB_OK){const patch={nombre,cedula,rol,apodo};if(pass)patch.pass=pass;await SB.patch('usuarios',patch,`id=eq.${eid}`);}
    }
  }else{
    if(!pass||pass.length<4){alert('Contraseña mín 4 caracteres');return;}
    if(S.usrs.find(u=>u.cedula===cedula)){alert('Cédula ya existe');return;}
    if(DB_OK){
      const r=await SB.post('usuarios',{nombre,cedula,pass,rol,activo:true,apodo});
      if(r&&r[0]){S.usrs.push({id:r[0].id,nombre,cedula,pass,rol,activo:true,apodo});}
    }else{S.usrs.push({id:gid(),nombre,cedula,pass,rol,activo:true,apodo});}
  }
  // Actualizar apodo del usuario logueado si se editó a sí mismo
  if(eid&&S.u?.id===eid)S.u.apodo=apodo;
  closeModal();render();
}
async function saveApodo(uid){
  const inp=document.getElementById('apodo_'+uid);
  if(!inp)return;
  const apodo=inp.value.trim();
  const i=S.usrs.findIndex(u=>u.id===uid);
  if(i>-1){
    S.usrs[i].apodo=apodo;
    if(DB_OK)await SB.patch('usuarios',{apodo},`id=eq.${uid}`);
    if(S.u?.id===uid)S.u.apodo=apodo;
    alert(`✅ Nombre de saludo actualizado: ${apodo||'(sin apodo)'}`);
  }
}
async function toggleUser(uid){
  const i=S.usrs.findIndex(u=>u.id===uid);
  if(i>-1){
    if(S.usrs[i].id===S.u.id){alert('No puedes desactivarte');return;}
    S.usrs[i].activo=!S.usrs[i].activo;
    if(DB_OK)await SB.patch('usuarios',{activo:S.usrs[i].activo},`id=eq.${uid}`);
    render();
  }
}
async function deleteUser(uid){
  if(uid===S.u.id){alert('No puedes eliminarte');return;}
  const u=S.usrs.find(x=>x.id===uid);if(!confirm(`¿Eliminar "${u?.nombre}"?`))return;
  if(DB_OK)await SB.del('usuarios',`id=eq.${uid}`);
  S.usrs=S.usrs.filter(u=>u.id!==uid);render();
}

function confirmLabEx(cat,cid){

function svEx(){
  const s=window._ex;
  // Recoger fechas
  const rxFecha=document.getElementById('rx_fecha')?.value||'';
  const rxHora=document.getElementById('rx_hora')?.value||'';
  const fichaFecha=document.getElementById('ficha_fecha')?.value||'';
  const fichaHora=document.getElementById('ficha_hora')?.value||'';
  const ecoFecha=document.getElementById('eco_fecha')?.value||'';
  const ecoHora=document.getElementById('eco_hora')?.value||'';
  const ekgFecha=document.getElementById('ekg_fecha')?.value||'';
  const ekgHora=document.getElementById('ekg_hora')?.value||'';
  const medFecha=document.getElementById('med_fecha')?.value||'';
  const medHora=document.getElementById('med_hora')?.value||'';
  // Collect RX rows
  const rxStudies=[];
  for(let i=0;i<(window._rxCount||1);i++){
    const pe=document.getElementById('rxp_'+i);const pre=document.getElementById('rxpr_'+i);
    if(pe&&pe.value){rxStudies.push({parte:pe.value,proy:pre?pre.value:'AP'});}
  }
  if(!s.lab.length&&!rxStudies.length&&!s.eco&&!s.ekg&&!s.esp&&!s.aud&&!s.med&&!s.ficha&&!s.psiocu&&!s.psicli){alert('Selecciona al menos un examen o servicio');return;}
  if(s.lab.length)addO({aid:s.aid,pid:s.pid,cat:'laboratorio',exams:[...s.lab]});
  rxStudies.forEach(rx=>addO({aid:s.aid,pid:s.pid,cat:'radiologia',parte:rx.parte,proy:rx.proy,fecha_prog:rxFecha,hora_prog:rxHora}));
  if(s.eco)addO({aid:s.aid,pid:s.pid,cat:'ecografia',exams:['Ecografía'],fecha_prog:ecoFecha,hora_prog:ecoHora});
  if(s.ekg)addO({aid:s.aid,pid:s.pid,cat:'electrocardiograma',exams:['EKG 12 derivaciones'],fecha_prog:ekgFecha,hora_prog:ekgHora});
  if(s.esp)addO({aid:s.aid,pid:s.pid,cat:'espirometria',exams:['Espirometría']});
  if(s.aud)addO({aid:s.aid,pid:s.pid,cat:'audiometria',exams:['Audiometría']});
  if(s.psiocu)addO({aid:s.aid,pid:s.pid,cat:'psico_ocupacional',exams:['Valoración Psicológica Ocupacional']});
  if(s.psicli)addO({aid:s.aid,pid:s.pid,cat:'psico_clinica',exams:['Valoración Psicológica Clínica']});
  if(s.med)addO({aid:s.aid,pid:s.pid,cat:'atencion_medica',exams:['Atención Médica'],fecha_prog:medFecha,hora_prog:medHora});
  if(s.ficha)addO({aid:s.aid,pid:s.pid,cat:'ficha_ocupacional',exams:['Ficha Ocupacional'],fecha_prog:fichaFecha,hora_prog:fichaHora});

async function eliminarVisita(aid){
  const a=S.apt.find(x=>x.id===aid);if(!a)return;
  const p=gP(a.pid);
  const ords=S.ord.filter(o=>o.aid===aid);
  if(!confirm(`⚠️ ¿Eliminar esta visita?\n\nPaciente: ${p?.nombre||''}\nFecha: ${fD(a.fecha)} ${fT(a.hora)}\nEmpresa: ${a.empresa||p?.empresa||''}\n${ords.length>0?`\nSe eliminarán también ${ords.length} orden(es) asignada(s).`:''}
\nEsta acción no se puede deshacer.`))return;
  // Eliminar órdenes de esta cita
  for(const o of ords){
    S.ord=S.ord.filter(x=>x.id!==o.id);
    if(DB_OK)await SB.del('ordenes',`id=eq.${o.id}`);
  }
  // Eliminar cita
  S.apt=S.apt.filter(x=>x.id!==aid);
  if(DB_OK)await SB.del('citas',`id=eq.${aid}`);
  render();
  showToast('✅ Visita eliminada correctamente','ok');
}

      body.querySelectorAll('input,select,textarea').forEach(el=>{
        el.disabled=true;
        el.style.background='#f0f0f0';
        el.style.color='#555';
        el.style.cursor='not-allowed';
        el.style.pointerEvents='none';
      });
      // Bloquear todos los botones EXCEPTO los de impresión
      const printFns=['generarPDFOficial','generarConsentimiento','generarConfidencialidad'];
      body.querySelectorAll('button').forEach(el=>{

// ═══ CALENDAR ═══
function rCal(){
  const cv=S.calView;
  const d=S.cDate;const y=d.getFullYear(),m=d.getMonth(),dd=d.getDate();
  const mn=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const mnS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const dn=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const dnF=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const evC={pendiente:'var(--ws)',confirmada:'var(--as)',en_proceso:'var(--tls)',completada:'var(--oks)',cancelada:'var(--ers)'};
  const evT={pendiente:'#92400e',confirmada:'var(--a)',en_proceso:'var(--tl)',completada:'var(--ok)',cancelada:'var(--er)'};

  function ds(dt){return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
  function getWeekStart(dt){const d=new Date(dt);d.setDate(d.getDate()-d.getDay());return d;}

  let navH='',bodyH='';

  // ═══ VIEW TABS ═══
  const tabs=`<div class="cvtabs">
    <button class="cvt ${cv==='month'?'on':''}" onclick="S.calView='month';render()">Mes</button>
    <button class="cvt ${cv==='week'?'on':''}" onclick="S.calView='week';render()">Semana</button>
    <button class="cvt ${cv==='day'?'on':''}" onclick="S.calView='day';render()">Día</button>
  </div>`;

  if(cv==='month'){
    // ═══ MONTH VIEW ═══
    const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();
    let c='';for(let i=fd-1;i>=0;i--)c+=`<div class="cdy om"><div class="cdn">${dip-i}</div></div>`;
    for(let i=1;i<=dim;i++){
      const dstr=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      const da=S.apt.filter(a=>a.fecha===dstr&&a.estado!=='cancelada');
      const ev=da.slice(0,2).map(a=>{const p=gP(a.pid);return`<div class="cev" style="background:${evC[a.estado]};color:${evT[a.estado]}">${fT(a.hora)} ${p?.nombre?.split(' ')[0]||''}</div>`;}).join('');
      c+=`<div class="cdy ${dstr===TD?'tod':''}" onclick="S.cDate=new Date(${y},${m},${i});S.calView='day';render()"><div class="cdn">${i}</div>${ev}${da.length>2?`<div style="font-size:8px;color:var(--tm)">+${da.length-2} más</div>`:''}</div>`;
    }
    navH=`<button class="btn bic bg" onclick="S.cDate=new Date(${y},${m-1});render()">${ic('cL')}</button><h3 style="min-width:180px;text-align:center">${mn[m]} ${y}</h3><button class="btn bic bg" onclick="S.cDate=new Date(${y},${m+1});render()">${ic('cR')}</button>`;
    bodyH=`<div class="cgr">${dn.map(d=>`<div class="cdyh">${d}</div>`).join('')}${c}</div>`;

  }else if(cv==='week'){
    // ═══ WEEK VIEW ═══
    const ws=getWeekStart(d);
    const we=new Date(ws);we.setDate(we.getDate()+6);
    const weekDays=[];for(let i=0;i<7;i++){const wd=new Date(ws);wd.setDate(wd.getDate()+i);weekDays.push(wd);}
    const hours=[];for(let h=7;h<=18;h++)hours.push(h);

    navH=`<button class="btn bic bg" onclick="S.cDate=new Date(${ws.getFullYear()},${ws.getMonth()},${ws.getDate()-7});render()">${ic('cL')}</button><h3 style="min-width:220px;text-align:center">${ws.getDate()} ${mnS[ws.getMonth()]} — ${we.getDate()} ${mnS[we.getMonth()]} ${we.getFullYear()}</h3><button class="btn bic bg" onclick="S.cDate=new Date(${ws.getFullYear()},${ws.getMonth()},${ws.getDate()+7});render()">${ic('cR')}</button>`;

    let hdr=`<div class="wgh" style="font-size:8px">Hora</div>`;
    weekDays.forEach(wd=>{const dstr=ds(wd);hdr+=`<div class="wgh ${dstr===TD?'tod':''}">${dn[wd.getDay()]}<br><span style="font-size:13px;font-weight:700">${wd.getDate()}</span></div>`;});

    let rows='';
    hours.forEach(h=>{
      rows+=`<div class="whr">${h>12?h-12:h}${h>=12?'p':'a'}</div>`;
      weekDays.forEach(wd=>{
        const dstr=ds(wd);
        const ha=S.apt.filter(a=>a.fecha===dstr&&a.estado!=='cancelada'&&+a.hora.split(':')[0]===h);
        const evs=ha.map(a=>{const p=gP(a.pid);return`<span class="wev" style="background:${evC[a.estado]};color:${evT[a.estado]}">${fT(a.hora)} ${p?.nombre?.split(' ')[0]||''}</span>`;}).join('');
        rows+=`<div class="wcl" onclick="S.cDate=new Date(${wd.getFullYear()},${wd.getMonth()},${wd.getDate()});S.calView='day';render()">${evs}</div>`;
      });
    });
    bodyH=`<div class="wgr">${hdr}${rows}</div>`;

  }else{
    // ═══ DAY VIEW ═══
    const dstr=ds(d);
    const dayApts=S.apt.filter(a=>a.fecha===dstr).sort((a,b)=>a.hora.localeCompare(b.hora));
    const hours=[];for(let h=7;h<=18;h++){hours.push(h);}

    navH=`<button class="btn bic bg" onclick="S.cDate=new Date(${y},${m},${dd-1});render()">${ic('cL')}</button><h3 style="min-width:220px;text-align:center">${dnF[d.getDay()]} ${dd} de ${mn[m]}, ${y}</h3><button class="btn bic bg" onclick="S.cDate=new Date(${y},${m},${dd+1});render()">${ic('cR')}</button>`;

    let rows='';
    hours.forEach(h=>{
      const ha=dayApts.filter(a=>+a.hora.split(':')[0]===h);
      const evs=ha.map(a=>{
        const p=gP(a.pid);const o=gAO(a.id);
        return`<div class="dev" style="background:${evC[a.estado]};color:${evT[a.estado]}">
          <span style="font-family:'Space Mono',monospace;font-weight:700">${fT(a.hora)}</span>
          <span>${p?.nombre||'—'}</span>
          <span style="opacity:.7;font-size:9px">${p?.empresa||''}</span>
          <span style="font-size:9px">${a.tipo}</span>
          ${o.length?`<span style="font-size:8px;background:rgba(0,0,0,.15);padding:1px 4px;border-radius:3px">${o.length} órd.</span>`:''}
        </div>`;
      }).join('');
      rows+=`<div class="dhr">${h>12?h-12:h}:00 ${h>=12?'PM':'AM'}</div><div class="dcl">${evs||''}</div>`;
    });
    bodyH=`<div class="dgr">${rows}</div>
    ${dayApts.length>0?`<div class="cd" style="margin-top:10px"><div class="cdh"><h3>Citas del día (${dayApts.length})</h3></div>
    <div class="tw"><table><thead><tr><th>Hora</th><th>Paciente</th><th>Empresa</th><th>Tipo</th><th>Estado</th><th>Exám.</th><th>Acc.</th></tr></thead><tbody>
    ${dayApts.map(a=>{const p=gP(a.pid);const o=gAO(a.id);return`<tr>
      <td class="mono" style="font-weight:600">${fT(a.hora)}</td>
      <td class="clk" onclick="nav('det',{p:gP('${a.pid}')})">${p?.nombre||'—'}</td>
      <td style="font-size:11px">${p?.empresa||''}</td><td>${a.tipo}</td>
      <td><span class="ba ${EB[a.estado]}">${EL[a.estado]}</span></td>
      <td>${a.exAsig?`<span class="ba ba-t">${o.length} órd.</span>`:'<span class="ba ba-w">—</span>'}</td>
      <td style="display:flex;gap:2px"><button class="abtn ${a.asistio===true?'y':''}" onclick="mrkA('${a.id}',true)">${ic('chk',12)}</button><button class="abtn ${a.asistio===false?'n':''}" onclick="mrkA('${a.id}',false)">${ic('x',12)}</button><button class="btn bsm bw" style="font-size:9px;padding:2px 6px" onclick="sendReminder(S.apt.find(x=>x.id==='${a.id}'))">📤</button></td></tr>`;}).join('')}</tbody></table></div></div>`:
    `<div class="es" style="margin-top:10px"><h4>Sin citas este día</h4></div>`}`;
  }

  // Today button
  const todayBtn=`<button class="btn bsm bg" onclick="S.cDate=new Date();render()" style="font-size:10px">📅 Hoy</button>`;

  return`<div class="ph"><div style="display:flex;align-items:center;gap:10px">${getEmpCfg().logo?`<img src="${getEmpCfg().logo}" style="width:${getEmpCfg().logo_size||40}px;object-fit:contain;border-radius:6px">`:''}<h2>Calendario</h2>${tabs}</div><div style="display:flex;gap:6px">${todayBtn}<button class="btn bp" onclick="amMod()">${ic('pls')} Nueva Cita</button></div></div>
  <div class="cd"><div class="cdh"><div style="display:flex;align-items:center;gap:12px">${navH}</div></div>
  <div class="cdb">${bodyH}</div></div>`;
}

// ═══ NURSING ═══
if(!S.nrsFilter)S.nrsFilter='hoy';

function getNrsDate(){
  const h=new Date();
  if(S.nrsFilter==='hoy')return TD;
  if(S.nrsFilter==='manana'){
    const m=new Date(h);m.setDate(m.getDate()+1);return m.toISOString().split('T')[0];
  }
  if(S.nrsFilter==='semana'){return 'semana';}
  if(S.nrsFilter==='custom')return S.nrsCustomDate||TD;
  return TD;
}

function rNrs(){
  const fd=getNrsDate();
  let tA;
  if(fd==='semana'){
    const h=new Date();
    const dom=new Date(h);dom.setDate(dom.getDate()-dom.getDay());
    const sab=new Date(dom);sab.setDate(sab.getDate()+6);
    const desde=dom.toISOString().split('T')[0];
    const hasta=sab.toISOString().split('T')[0];
    tA=S.apt.filter(a=>a.fecha>=desde&&a.fecha<=hasta&&a.estado!=='cancelada');
  }else{
    tA=S.apt.filter(a=>a.fecha===fd&&a.estado!=='cancelada');
  }
  tA.sort((a,b)=>(a.fecha+a.hora).localeCompare(b.fecha+b.hora));

  const pending=tA.filter(a=>!a.exAsig).length;
  const inProcess=tA.filter(a=>a.exAsig&&a.estado!=='completada').length;

  // Date labels
  const manana=new Date();manana.setDate(manana.getDate()+1);
  const mananaStr=manana.toISOString().split('T')[0];

            ${isDone?'<span style="color:white;font-size:12px">✓</span>':''}

          </div>

        <div style="display:flex;align-items:center;gap:6px">

          <button class="btn bsm ${a.exAsig?'bg':'bt'}" onclick="exMod('${a.id}')">${a.exAsig?'✏️ Editar':'➕ Asignar'}</button>
          ${p?.telefono?`<button class="btn bsm" style="background:#25d366;color:#fff" onclick="sendWA('${a.id}')">📱 WhatsApp</button>`:''}

async function svCargo(cid){
  const codigo=document.getElementById('cg_cod')?.value?.trim();
  const nombre=document.getElementById('cg_nom')?.value?.trim();
  if(!codigo||!nombre){alert('Código y nombre son obligatorios');return;}
  if(!S.cargos_ciuo)S.cargos_ciuo=[];
  if(cid){
    const i=S.cargos_ciuo.findIndex(c=>c.id===cid);
    if(i>-1){
      S.cargos_ciuo[i].codigo=codigo;S.cargos_ciuo[i].nombre=nombre;
      if(DB_OK)await SB.patch('cargos_ciuo',{codigo,nombre},`id=eq.${cid}`);
    }
  }else{
    if(DB_OK){
      const r=await SB.post('cargos_ciuo',{codigo,nombre});
      if(r&&r[0])S.cargos_ciuo.push({id:r[0].id,codigo,nombre});
      else S.cargos_ciuo.push({id:gid(),codigo,nombre});
    }else{S.cargos_ciuo.push({id:gid(),codigo,nombre});}
  }
  closeModal();render();
  alert(`✅ Cargo ${cid?'actualizado':'registrado'}: (${codigo}) ${nombre}`);
}

async function delCargo(cid){
  const c=(S.cargos_ciuo||[]).find(x=>x.id===cid);
  if(!c)return;
  if(!confirm(`¿Eliminar el cargo "${c.nombre}"?`))return;
  S.cargos_ciuo=S.cargos_ciuo.filter(x=>x.id!==cid);
  if(DB_OK)await SB.del('cargos_ciuo',`id=eq.${cid}`);
  render();
}

async function svCie10(cid){
  const codigo=document.getElementById('dx_cod')?.value?.trim().toUpperCase();
  const descripcion=document.getElementById('dx_desc')?.value?.trim();
  if(!codigo||!descripcion){alert('Código y descripción son obligatorios');return;}
  if(!S.cie10)S.cie10=[];
  if(cid){
    const i=S.cie10.findIndex(c=>c.id===cid);
    if(i>-1){
      S.cie10[i].codigo=codigo;S.cie10[i].descripcion=descripcion;
      if(DB_OK)await SB.patch('cie10',{codigo,descripcion},`id=eq.${cid}`);
    }
  }else{
    // Verificar si ya existe
    const existe=S.cie10.find(c=>c.codigo===codigo);
    if(existe){alert(`El código ${codigo} ya existe: ${existe.descripcion}`);return;}
    if(DB_OK){

    }else{S.cie10.push({id:gid(),codigo,descripcion});}

  alert(`✅ Diagnóstico ${cid?'actualizado':'registrado'}: ${codigo} — ${descripcion}`);

function getRiesgo(dim,puntaje){
  if(puntaje>=dim.bajR[0]&&puntaje<=dim.bajR[1])return{nivel:'Bajo',color:'#16a34a',bg:'#dcfce7'};
  if(puntaje>=dim.medR[0]&&puntaje<=dim.medR[1])return{nivel:'Medio',color:'#d97706',bg:'#fef9c3'};
  return{nivel:'Alto',color:'#dc2626',bg:'#fee2e2'};
}
function getRiesgoGlobal(total){
  if(total>=175)return{nivel:'Bajo',color:'#16a34a',bg:'#dcfce7'};
  if(total>=117)return{nivel:'Medio',color:'#d97706',bg:'#fef9c3'};
  return{nivel:'Alto',color:'#dc2626',bg:'#fee2e2'};
}

function calcularResultadosMinte(respuestas){
  // respuestas = array de arrays (una por trabajador) [{1:4,2:3,...}]
  const n=respuestas.length;
  if(n===0)return null;
  const resultados=MINTE_DIMS.map(dim=>{
    const suma=respuestas.reduce((acc,r)=>{
      return acc+dim.items.reduce((s,i)=>s+(r[i]||0),0);
    },0);
    const promedio=Math.round(suma/n);
    const riesgo=getRiesgo(dim,promedio);
    return{...dim,promedio,suma,riesgo};
  });
  const totalGlobal=resultados.reduce((s,d)=>s+d.promedio,0);
  const riesgoGlobal=getRiesgoGlobal(totalGlobal);
  return{resultados,totalGlobal,riesgoGlobal,n};
}

async function descargarInformePsi(eid){
  const e=(S.evalPsi||[]).find(x=>x.id===eid);
  if(!e)return;
  const resp=e._respuestas||[];
  if(resp.length===0){alert('⚠️ No hay respuestas ingresadas para generar el informe');return;}
  const res=calcularResultadosMinte(resp.map(r=>r.respuestas));
  const ec=getEmpCfg();

  if(typeof PptxGenJS==='undefined'){
    await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js';
      s.onload=resolve;s.onerror=reject;
      document.head.appendChild(s);

  // Helpers
  function header(slide,titulo,subtitulo=''){
    // Fondo header azul
    slide.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:1.3,fill:{color:C.azul}});
    slide.addShape(pptx.ShapeType.rect,{x:0,y:1.27,w:'100%',h:0.07,fill:{color:C.acento}});
    // Logo
    slide.addImage({data:LOGO_B64,x:0.15,y:0.1,w:1.0,h:1.0});
    // Titulo grande
    slide.addText(titulo,{x:1.35,y:0.1,w:8.2,h:0.75,fontSize:30,bold:true,color:C.blanco,valign:'middle'});
    if(subtitulo)slide.addText(subtitulo,{x:1.35,y:0.85,w:8.2,h:0.38,fontSize:12,color:'AED6F1',valign:'middle'});
    footer(slide);
  }
  function footer(slide){
    slide.addShape(pptx.ShapeType.rect,{x:0,y:6.88,w:'100%',h:0.62,fill:{color:C.azul}});
    slide.addShape(pptx.ShapeType.rect,{x:0,y:6.85,w:'100%',h:0.06,fill:{color:C.acento}});
    slide.addImage({data:LOGO_B64,x:0.1,y:6.9,w:0.5,h:0.5});
    slide.addText(ec.nombre||'VitalWork SAS',{x:0.7,y:6.92,w:4,h:0.35,fontSize:10,bold:true,color:C.blanco});
    slide.addText(`${e.empresa_nombre||''} · ${fD(e.fecha)}`,{x:5,y:6.92,w:4.5,h:0.35,fontSize:10,color:'AED6F1',align:'right'});
  }
  function card(slide,x,y,w,h,color=C.grisClaro,border=C.grisMed){
    slide.addShape(pptx.ShapeType.rect,{x,y,w,h,fill:{color},line:{color:border,pt:1},rounding:0.08});
  }
  function statBox(slide,x,y,w,label,value,color=C.azul){
    card(slide,x,y,w,1.4,C.blanco,C.grisMed);
    slide.addShape(pptx.ShapeType.rect,{x,y,w:w,h:0.06,fill:{color},line:{color}});
    slide.addText(label,{x:x+0.1,y:y+0.15,w:w-0.2,h:0.35,fontSize:10,color:C.grisOscuro,align:'center'});
    slide.addText(String(value),{x:x+0.1,y:y+0.45,w:w-0.2,h:0.7,fontSize:36,bold:true,color,align:'center'});
  }

function autoFillEmpPsi(val){
  const emp=(S.empresas_cli||[]).find(e=>e.nombre===val);
  if(!emp)return;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v||'';};
  set('ps_ruc',emp.ruc);
  set('ps_actividad',emp.ciiu||'');
  set('ps_representante',emp.contacto||'');
}

async function crearEval(){
  const tipo=document.getElementById('ps_tipo')?.value||'ministerio';
  const empresa=document.getElementById('ps_empresa')?.value?.trim()||'';
  const ruc=document.getElementById('ps_ruc')?.value?.trim()||'';
  const actividad=document.getElementById('ps_actividad')?.value?.trim()||'';
  const representante=document.getElementById('ps_representante')?.value?.trim()||'';
  const fecha=document.getElementById('ps_fecha')?.value||TD;
  if(!empresa){alert('⚠️ El nombre de la empresa es obligatorio');return;}
  const d={tipo,empresa_nombre:empresa,empresa_ruc:ruc,empresa_actividad:actividad,empresa_representante:representante,fecha,creado_por:S.u?.id||null};
  if(DB_OK){
    const r=await SB.post('eval_psicosocial',d);
    if(r&&r[0]){
      d.id=r[0].id;d._respuestas=[];
      if(!S.evalPsi)S.evalPsi=[];
      S.evalPsi.unshift(d);
      S.psiSocialTab='ingresar';S.evalIngresarId=d.id;
      render();showToast('✅ Evaluación creada. Ahora ingresa los test.','ok');return;
    }
  }
  alert('❌ Error al crear la evaluación. Verifica la conexión.');
}

async function guardarRespuesta(eid, accion='continuar'){
  // Recoger respuestas
  const resp={};
  const sinResponder=[];
  for(let n=1;n<=58;n++){
    const sel=document.querySelector(`input[name="p${n}"]:checked`);
    if(!sel){sinResponder.push(n);}
    else resp[n]=parseInt(sel.value);
  }
  if(sinResponder.length>0){
    const preg=MINTE_PREGUNTAS.find(p=>p.n===sinResponder[0]);
    alert(`⚠️ Faltan ${sinResponder.length} pregunta(s) por responder.\n\nPrimera sin responder:\nPregunta ${sinResponder[0]}: "${preg?.txt||''}"\n\nTodas las pendientes: ${sinResponder.join(', ')}`);
    // Hacer scroll a la primera pregunta sin responder
    const el=document.querySelector(`input[name="p${sinResponder[0]}"]`);
    if(el){el.closest('div[style]')?.scrollIntoView({behavior:'smooth',block:'center'});}
    return;
  }
  const dg={
    area:document.getElementById('dg_area')?.value||'',
    genero:document.getElementById('dg_genero')?.value||'',
    edad:document.getElementById('dg_edad')?.value||'',
    antiguedad:document.getElementById('dg_antiguedad')?.value||''
  };
  if(DB_OK){
    const r=await SB.post('eval_psicosocial_respuestas',{eval_id:eid,respuestas:resp,datos_generales:dg});
    if(r&&r[0]){
      const e=(S.evalPsi||[]).find(x=>x.id===eid);
      if(e){if(!e._respuestas)e._respuestas=[];e._respuestas.push({id:r[0].id,respuestas:resp,datos_generales:dg});}
      if(accion==='finalizar'){
        S.psiSocialTab='ver';S.evalVerId=eid;
      }else{
        S.psiSocialTab='ingresar';S.evalIngresarId=eid;
      }
      render();showToast(`✅ Test #${e._respuestas.length} guardado correctamente`,'ok');return;
    }
  }
  alert('❌ Error al guardar. Verifica la conexión.');
}

async function eliminarEval(eid){
  const e=(S.evalPsi||[]).find(x=>x.id===eid);
  if(!e)return;
  const resp=e._respuestas||[];
  if(!confirm(`⚠️ ¿Eliminar la evaluación de "${e.empresa_nombre}"?\n\nSe eliminarán también ${resp.length} test ingresados.\n\nEsta acción no se puede deshacer.`))return;
  if(DB_OK){
    await SB.del('eval_psicosocial',`id=eq.${eid}`);
    S.evalPsi=(S.evalPsi||[]).filter(x=>x.id!==eid);
  }
  S.psiSocialTab='lista';render();
  showToast('✅ Evaluación eliminada','ok');
}

// ═══ MEDICAL APPOINTMENT CONFIG ═══
function getMedCfg(){
  try{const v=localStorage.getItem('mediagenda_med_cfg');if(v)return JSON.parse(v);}catch(e){}
  return {inicio_h:7,inicio_m:0,fin_h:17,fin_m:0,intervalo:5};
}
async function saveMedCfg(){
  const ih=+document.getElementById('cfg_med_ih').value;
  const im=+document.getElementById('cfg_med_im').value;
  const fh=+document.getElementById('cfg_med_fh').value;
  const fm=+document.getElementById('cfg_med_fm').value;
  const iv=+document.getElementById('cfg_med_int').value;
  if(fh*60+fm<=ih*60+im){alert('La hora fin debe ser después de la hora inicio');return;}
  if(iv<5||iv>120){alert('El intervalo debe ser entre 5 y 120 minutos');return;}
  const cfg={inicio_h:ih,inicio_m:im,fin_h:fh,fin_m:fm,intervalo:iv};
  localStorage.setItem('mediagenda_med_cfg',JSON.stringify(cfg));
  if(DB_OK)await SB.patch('configuracion',{valor:JSON.stringify(cfg)},"clave=eq.med_cfg");
  render();
  const total=Math.floor(((fh*60+fm)-(ih*60+im))/iv);
  alert(`✅ Horario de citas médicas actualizado\nDesde ${ih>12?ih-12:ih}:${String(im).padStart(2,'0')} ${ih>=12?'PM':'AM'} hasta ${fh>12?fh-12:fh}:${String(fm).padStart(2,'0')} ${fh>=12?'PM':'AM'}\nIntervalo: cada ${iv} min\nCupos disponibles: ${total}`);
}
function getMedSlots(){
  const c=getMedCfg();const slots=[];
  let cur=c.inicio_h*60+c.inicio_m;const fin=c.fin_h*60+c.fin_m;
  while(cur<fin){
    const hh=String(Math.floor(cur/60)).padStart(2,'0');
    const mm=String(cur%60).padStart(2,'0');
    slots.push(`${hh}:${mm}`);cur+=c.intervalo;
  }
  return slots;
}

// ═══ BACKUP SYSTEM ═══
const MAX_BKP=10;
function getBkps(){return JSON.parse(localStorage.getItem('mediagenda_backups')||'[]');}
function saveBkps(b){localStorage.setItem('mediagenda_backups',JSON.stringify(b));}

function genBkp(){
  const data={
    version:'MediAgenda-v3',
    fecha:new Date().toISOString(),
    pacientes:S.pts,
    citas:S.apt,
    ordenes:S.ord,
    usuarios:S.usrs,
    catalogo_lab:LAB,
  };
  // Save internal
  let bkps=getBkps();
  bkps.unshift({id:gid(),fecha:data.fecha,data:data});
  if(bkps.length>MAX_BKP)bkps=bkps.slice(0,MAX_BKP);
  saveBkps(bkps);
  // Download JSON
  const jsonStr=JSON.stringify(data,null,2);
  const blob=new Blob([jsonStr],{type:'application/json'});
  const fn=`MediAgenda_Respaldo_${new Date().toISOString().slice(0,19).replace(/[T:]/g,'-')}.json`;
  dlFile(blob,fn);
  // Download Excel CSV
  genExcelBkp(data);
  render();
  alert('✅ Respaldo #'+(getBkps().length)+' generado\n📥 JSON descargado\n📊 Excel descargado');
}

function genExcelBkp(data){
  // Generate CSV (opens perfectly in Excel)
  let csv='\uFEFF'; // BOM for UTF-8 in Excel
  // Sheet: Pacientes
  csv+='=== PACIENTES ===\n';
  csv+='Nombre,Cédula,Teléfono,Email,Género,Dirección,Ciudad,Empresa,Cargo,Fecha Nac.\n';
  (data.pacientes||[]).forEach(p=>{
    csv+=`"${p.nombre||''}","${p.cedula||''}","${p.telefono||''}","${p.email||''}","${p.genero||''}","${p.direccion||''}","${p.ciudad||''}","${p.empresa||''}","${p.cargo||''}","${p.fecha_nacimiento||''}"\n`;
  });
  csv+='\n=== CITAS ===\n';
  csv+='Paciente,Empresa,Tipo,Fecha,Hora,Estado,Exámenes Asignados\n';
  (data.citas||[]).forEach(a=>{
    const p=(data.pacientes||[]).find(x=>x.id===a.pid);
    csv+=`"${p?.nombre||''}","${p?.empresa||''}","${a.tipo||''}","${a.fecha||''}","${a.hora||''}","${a.estado||''}","${a.exAsig?'Sí':'No'}"\n`;
  });
  csv+='\n=== ÓRDENES MÉDICAS ===\n';
  csv+='Paciente,Empresa,Categoría,Detalle,Estado\n';
  (data.ordenes||[]).forEach(o=>{
    const p=(data.pacientes||[]).find(x=>x.id===o.pid);
    const det=o.cat==='radiologia'?`${o.parte} - ${o.proy}`:(o.exams||[]).join(', ');
    csv+=`"${p?.nombre||''}","${p?.empresa||''}","${o.cat||''}","${det}","${o.estado||''}"\n`;
  });
  csv+='\n=== USUARIOS ===\n';
  csv+='Nombre,Cédula,Rol,Activo\n';
  (data.usuarios||[]).forEach(u=>{
    csv+=`"${u.nombre||''}","${u.cedula||''}","${u.rol||''}","${u.activo?'Sí':'No'}"\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const fn=`MediAgenda_Respaldo_${new Date().toISOString().slice(0,19).replace(/[T:]/g,'-')}.csv`;
  dlFile(blob,fn);
}

function dlFile(blob,fn){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fn;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function restoreBkp(idx){
  const bkps=getBkps();
  if(!bkps[idx]){alert('Respaldo no encontrado');return;}
  if(!confirm('⚠️ ¿Restaurar este respaldo?\nSe reemplazarán TODOS los datos actuales.'))return;
  applyBkp(bkps[idx].data);
}

function applyBkp(data){
  if(!data||data.version!=='MediAgenda-v3'){alert('❌ Archivo no válido o versión incompatible');return;}
  S.pts=data.pacientes||[];
  S.apt=data.citas||[];
  S.ord=data.ordenes||[];
  S.usrs=data.usuarios||[];
  if(data.catalogo_lab){LAB=data.catalogo_lab;saveLAB();}
  // Re-login needed
  const currentUser=S.usrs.find(u=>u.id===S.u?.id);
  if(currentUser){S.u=currentUser;}else{S.u=S.usrs[0]||null;}
  render();
  alert('✅ Respaldo restaurado correctamente\nPacientes: '+S.pts.length+'\nCitas: '+S.apt.length+'\nÓrdenes: '+S.ord.length+'\nUsuarios: '+S.usrs.length);
}

function deleteBkp(idx){
  if(!confirm('¿Eliminar este respaldo?'))return;
  let bkps=getBkps();bkps.splice(idx,1);saveBkps(bkps);render();
}

function downloadBkp(idx){
  const bkps=getBkps();if(!bkps[idx])return;
  const d=bkps[idx].data;
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  dlFile(blob,`MediAgenda_Respaldo_${bkps[idx].fecha.slice(0,19).replace(/[T:]/g,'-')}.json`);
}

function uploadBkp(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.version||data.version!=='MediAgenda-v3'){alert('❌ Archivo no válido');return;}
        if(!confirm(`¿Restaurar respaldo del ${new Date(data.fecha).toLocaleString('es-EC')}?\n\nPacientes: ${(data.pacientes||[]).length}\nCitas: ${(data.citas||[]).length}\nÓrdenes: ${(data.ordenes||[]).length}\nUsuarios: ${(data.usuarios||[]).length}\n\n⚠️ Se reemplazarán todos los datos actuales.`))return;
        applyBkp(data);
      }catch(err){alert('❌ Error leyendo archivo: '+err.message);}
    };
    reader.readAsText(f);
  };
  inp.click();
}

function getEmpCfgRaw(){try{return JSON.parse(localStorage.getItem('mediagenda_emp')||'{}');}catch(e){return{};}}
function getEmpCfg(){
  const def={nombre:CFG.CLINIC,direccion:CFG.ADDR,email:'',telefono:'',wa_phone:CFG.WA_PHONE||'',wa_token:'',wa_phone_id:'',logo:'',logo_size:80,logo_pos:'left'};
  return{...def,...getEmpCfgRaw()};
}

async function saveEmpCfg(){
  const cfg={
    nombre:document.getElementById('cfg_nombre').value.trim(),
    direccion:document.getElementById('cfg_addr').value.trim(),
    maps_url:document.getElementById('cfg_maps').value.trim(),
    email:document.getElementById('cfg_email').value.trim(),
    telefono:document.getElementById('cfg_tel').value.trim(),
    wa_phone:document.getElementById('cfg_wa').value.trim(),
    wa_token:document.getElementById('cfg_wa_token').value.trim(),
    wa_phone_id:document.getElementById('cfg_wa_pid').value.trim(),
  };
  const prev=getEmpCfg();
  const merged={...prev,...cfg};
  localStorage.setItem('mediagenda_emp',JSON.stringify(merged));
  CFG.CLINIC=merged.nombre||CFG.CLINIC;CFG.ADDR=merged.direccion||CFG.ADDR;
  CFG.WA_PHONE=merged.wa_phone;CFG.WA_TOKEN=merged.wa_token;CFG.WA_PHONE_ID=merged.wa_phone_id;
  if(DB_OK)await SB.patch('configuracion',{valor:JSON.stringify(merged)},"clave=eq.empresa");
  render();alert('✅ Datos de empresa guardados');
}

function loadLogoFile(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(e){
    document.getElementById('cfg_logo').value=e.target.result;
    const prev=document.getElementById('logo_prev');
    if(prev.tagName==='IMG'){prev.src=e.target.result;}
    else{prev.outerHTML=`<img id="logo_prev" src="${e.target.result}" style="width:${getEmpCfg().logo_size||80}px;border-radius:8px">`;}
  };
  r.readAsDataURL(f);
}

async function saveLogoCfg(){
  const logo=document.getElementById('cfg_logo').value.trim();
  const size=+document.getElementById('cfg_logo_size').value;
  const pos=document.getElementById('cfg_logo_pos').value;
  const prev=getEmpCfg();
  const merged={...prev,logo,logo_size:size,logo_pos:pos};
  localStorage.setItem('mediagenda_emp',JSON.stringify(merged));
  if(DB_OK)await SB.patch('configuracion',{valor:JSON.stringify(merged)},"clave=eq.empresa");
  render();alert('✅ Logo guardado');
}

async function abrirFichaInteligente(pid,aid){

      const uf=r[0];
      FO.fid=null; // nueva ficha
      FO.data={
        a:{...uf.seccion_a||{}},
        b:{...(uf.seccion_b||{}),fecha_atencion:TD,tipo_eval:(uf.seccion_b||{}).tipo_eval||'INGRESO'},

        f:{hallazgos:{},observaciones:''},
        g:{...uf.seccion_g||{}},
        h:{...uf.seccion_h||{}},
        i:{actividades:[]},
        j:{categorias:[],observaciones:''},
        k:{diagnosticos:[]},
        l:{aptitud:'',observaciones:''},
        m:{estandar:[],medicas:''},
        n:{...uf.seccion_n||{}},
        r:{...uf.seccion_r||{}}
      };
    }else{
      // Sin historial: ficha en blanco con datos básicos
      preloadFichaData(p);
    }
  }else{
    preloadFichaData(p);
  }
  S.v='ficha';render();
}

function preloadFichaData(p){
  const emp=(S.empresas_cli||[]).find(e=>e.nombre?.toLowerCase()===p.empresa?.toLowerCase())||{};
  const cargo=(S.cargos_ciuo||[]).find(c=>c.nombre?.toLowerCase()===p.cargo?.toLowerCase())||{};
  const partes=(p.nombre||'').toUpperCase().split(' ');
  let ap1='',ap2='',n1='',n2='';
  if(partes.length>=4){ap1=partes[0];ap2=partes[1];n1=partes[2];n2=partes.slice(3).join(' ');}
  else if(partes.length===3){ap1=partes[0];ap2='';n1=partes[1];n2=partes[2];}
  else if(partes.length===2){ap1=partes[0];n1=partes[1];}else{n1=p.nombre||'';}
  const mc=getMedCfg();
  // Buscar médico: primero de getMedCfg, luego de la lista guardada
  const medList=JSON.parse(localStorage.getItem('vw_medicos_list')||'[]');
  const medNombre=mc.nombre||( medList.length?medList[0].nombre:'')||S.u?.nombre||'';
  const medCodigo=mc.codigo||(medList.length?medList[0].codigo:'')||'';
  FO.data={
    a:{empresa:emp.nombre||p.empresa||'',ruc:emp.ruc||'',ciiu:emp.ciiu||'',centro:emp.nombre||p.empresa||'',nform:p.cedula||'',narch:p.cedula||'',ap1,ap2,n1,n2,sexo:p.genero==='masculino'?'M':p.genero==='femenino'?'F':'',cargo:cargo.codigo?`(${cargo.codigo}) ${p.cargo||''}`:(p.cargo||''),grupo_sang:'',lateralidad:'Diestro',atencion_prioritaria:[]},
    b:{puesto_ciuo:p.cargo||'',fecha_atencion:TD,tipo_eval:'INGRESO',fecha_ingreso:'',observacion:''},
    c:{ant_clinicos:'APP: Niega\nAQx: Niega\nAlergias: Niega\nAPsi: Niega',ant_familiares:'Niega',aut_transfusion:'No',trat_hormonal:'No',trat_hormonal_detalle:'',reprod_exam:'',reprod_tiempo:'',reprod_planif:'No',sustancias:[{nombre:'Tabaco',estado:'Nunca',consumo:'',abstinencia:''},{nombre:'Alcohol',estado:'Nunca',consumo:'',abstinencia:''}],actividad_fisica:[],medicacion:'Ninguna'},
    d:{descripcion:''},
    e:{temp:'36.5',pa_s:'120',pa_d:'80',fc:'70',fr:'16',sat:'98',peso:'',talla:'',imc:'',clasif_imc:'',perim_abd:''},
    f:{hallazgos:{},observaciones:''},
    g:loadRiesgoPlantilla(p.cargo)||{riesgos:{},medidas:'USO DE PRENDAS DE PREVENCIÓN\nPAUSAS ACTIVAS\nCUMPLIMIENTO DE PROTOCOLOS DE BIOSEGURIDAD Y TRABAJO SEGURO'},
    h:{empleos:[{centro:p.empresa||'',cargo:p.cargo||'',estado:'ACTUAL',tiempo:'',inc_data:{}}]},
    i:{actividades:[]},
    j:{categorias:[],observaciones:''},
    k:{diagnosticos:[]},
    l:{aptitud:'',observaciones:''},
    m:{estandar:[],medicas:''},
    n:{medico:medNombre,codigo:medCodigo},r:{se_realiza:'SÍ',condicion_trabajo:'NO',observacion:'NINGUNA'}
  };
}

function calcFichaProgress(){
  const d=FO.data;if(!d||!d.a)return 0;
  const isRetiro=(d.b||{}).tipo_eval==='RETIRO';
  let filled=0,total=isRetiro?15:14;
  if(d.a?.empresa)filled++;
  if(d.b?.tipo_eval)filled++;
  if(d.c?.ant_clinicos||d.c?.ant_familiares)filled++;
  if(d.d?.descripcion)filled++;
  if(d.e?.peso&&d.e?.talla)filled++;
  if(d.f?.observaciones||Object.keys(d.f?.hallazgos||{}).length)filled++;
  if((d.g?.fisicos||[]).length||(d.g?.quimicos||[]).length||(d.g?.ergonomicos||[]).length)filled++;
  if((d.h?.empleos||[]).length&&d.h.empleos[0]?.centro)filled++;
  if((d.i?.actividades||[]).length)filled++;
  if((d.j?.examenes||[]).length)filled++;
  if((d.k?.diagnosticos||[]).length)filled++;
  if(d.l?.aptitud)filled++;
  if(d.m?.medicas||(d.m?.estandar||[]).length)filled++;
  if(isRetiro&&d.r?.se_realiza)filled++;
  if(d.n?.medico)filled++;
  return Math.round(filled/total*100);
}

function validateFichaRequired(){
  const d=FO.data;const a=d.a||{};
  const missing=[];
  if(!a.ap1 || a.ap1.length===0) missing.push('Primer Apellido');
  if(!a.ap2 || a.ap2.length===0) missing.push('Segundo Apellido');
  if(!a.n1 || a.n1.length===0) missing.push('Primer Nombre');
  if(!a.n2 || a.n2.length===0) missing.push('Segundo Nombre');
  if(!a.sexo || a.sexo==='' || a.sexo==='--') missing.push('Sexo');
  return missing;
}

function fichaNav(dir){
  saveFichaSection();
  // Validar campos obligatorios al salir de sección A
  if(FO.sec==='A' && dir===1){
    const missing=validateFichaRequired();
    if(missing.length){
      showFichaError(missing);
      return;
    }
  }
  const isRetiro=(FO.data.b||{}).tipo_eval==='RETIRO';
  const keys=isRetiro?['A','B','C','D','E','F','G','H','I','J','K','L','M','R','N']:['A','B','C','D','E','F','G','H','I','J','K','L','M','N'];
  const i=keys.indexOf(FO.sec)+dir;
  if(i>=0&&i<keys.length){FO.sec=keys[i];render();}
}
function fichaGoSec(k){
  saveFichaSection();
  // Si va a otra sección diferente de A, validar obligatorios
  if(FO.sec==='A' && k!=='A'){
    const missing=validateFichaRequired();
    if(missing.length){
      showFichaError(missing);
      return;
    }
  }
  FO.sec=k;render();
}

function showFichaError(missing){
  // Resaltar campos vacíos con borde rojo
  const fieldMap={'Primer Apellido':'fo_ap1','Segundo Apellido':'fo_ap2','Primer Nombre':'fo_n1','Segundo Nombre':'fo_n2','Sexo':'fo_sexo'};
  missing.forEach(m=>{
    const id=fieldMap[m];
    if(id){const el=document.getElementById(id);if(el){el.style.border='2px solid red';el.style.background='#fff5f5';}}
  });
  // Mostrar mensaje visual
  let box=document.getElementById('ficha_error_msg');
  if(!box){box=document.createElement('div');box.id='ficha_error_msg';const parent=document.getElementById('ficha_sec_body');if(parent)parent.prepend(box);}
  if(box){
    box.innerHTML=`<div style="background:#fed7d7;border:2px solid #fc8181;border-radius:8px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px">
      <span style="font-size:22px">⚠️</span>
      <div><div style="font-weight:700;color:#c53030;font-size:14px;margin-bottom:6px">Faltan campos obligatorios</div>
      <div style="font-size:12px;color:#9b2c2c;line-height:1.6">${missing.map(m=>'• '+m).join('<br>')}</div></div></div>`;
    box.scrollIntoView({behavior:'smooth',block:'start'});
  } else {
    // Fallback si no encuentra el contenedor
    alert('⚠️ FALTAN CAMPOS OBLIGATORIOS:\n\n'+missing.map(m=>'• '+m).join('\n')+'\n\nComplete todos los campos marcados con * para continuar.');
  }
}

function saveFichaSection(){
  const s=FO.sec;const d=FO.data;
  if(s==='A'){
    // Si eligió "nueva empresa", tomar del input; si no, del select
    const sel=document.getElementById('fo_empresa_sel');
    const inp=document.getElementById('fo_empresa');
    const empNombre=(sel&&sel.value==='_nuevo')?(inp?.value?.trim()||''):(sel?.value||inp?.value||'');
    d.a={...d.a,empresa:empNombre,ruc:gv('fo_ruc'),ciiu:gv('fo_ciiu'),centro:gv('fo_centro'),nform:gv('fo_nform'),narch:gv('fo_narch'),ap1:gv('fo_ap1'),ap2:gv('fo_ap2'),n1:gv('fo_n1'),n2:gv('fo_n2'),sexo:gv('fo_sexo'),cargo:gv('fo_cargo'),grupo_sang:gv('fo_gsang'),lateralidad:d.a?.lateralidad||'Diestro',atencion_prioritaria:d.a?.atencion_prioritaria||[]};
    // Si es empresa nueva, guardarla en el catálogo
    if(empNombre&&!(S.empresas_cli||[]).find(e=>e.nombre===empNombre)){
      const newEmp={nombre:empNombre,ruc:'',ciiu:'',direccion:'',telefono:'',contacto:''};
      if(!S.empresas_cli)S.empresas_cli=[];
      if(DB_OK){SB.post('empresas',newEmp).then(r=>{if(r&&r[0])S.empresas_cli.push({id:r[0].id,...newEmp});else S.empresas_cli.push({id:gid(),...newEmp});});}
      else{S.empresas_cli.push({id:gid(),...newEmp});}
    }
    // Actualizar datos del paciente si se editaron
    const p=gP(FO.pid);
    if(p){
      const newCed=gv('fo_cedula');const newFn=gv('fo_fnac');
      if(newCed)p.cedula=newCed;
      if(newFn)p.fecha_nacimiento=newFn;
    }
  }else if(s==='B'){
    d.b={puesto_ciuo:gv('fo_puesto'),fecha_atencion:gv('fo_fecha_at'),tipo_eval:d.b?.tipo_eval||'INGRESO',fecha_ingreso:gv('fo_fingreso'),observacion:gv('fo_b_obs')};
  }else if(s==='C'){
    d.c={...d.c,ant_clinicos:gv('fo_antclin'),ant_familiares:gv('fo_antfam'),medicacion:gv('fo_medic')};
  }else if(s==='D'){
    d.d={descripcion:gv('fo_enfactual')};
  }else if(s==='E'){
    d.e={temp:gv('fo_temp'),pa_s:gv('fo_pas'),pa_d:gv('fo_pad'),fc:gv('fo_fc'),fr:gv('fo_fr'),sat:gv('fo_sat'),peso:gv('fo_peso'),talla:gv('fo_talla'),imc:gv('fo_imc'),clasif_imc:gv('fo_cimc'),perim_abd:gv('fo_pabd')};
  }else if(s==='F'){
    d.f={...d.f,observaciones:gv('fo_f_obs')};
  }else if(s==='G'){
    d.g={...d.g,medidas:gv('fo_g_medidas')};
  }else if(s==='J'){
    d.j={...d.j,observaciones:gv('fo_j_obs')};
  }else if(s==='L'){
    d.l={...d.l,observaciones:gv('fo_l_obs')};
  }else if(s==='M'){
    d.m={...d.m,medicas:gv('fo_m_med')};
  }else if(s==='R'){
    d.r={...d.r,se_realiza:d.r?.se_realiza||'',condicion_trabajo:d.r?.condicion_trabajo||'',observacion:gv('fo_r_obs')};
  }else if(s==='N'){
    d.n={medico:gv('fo_medico'),codigo:gv('fo_codmed')};
  }
}
function gv(id){return document.getElementById(id)?.value||'';}

function fichaSecContent(s){
  const d=FO.data;const a=d.a||{};const b=d.b||{};const c=d.c||{};const e=d.e||{};const f=d.f||{};const h=d.h||{};const j=d.j||{};const k=d.k||{};const l=d.l||{};const m=d.m||{};const n=d.n||{};

  if(s==='A') return fichaSecA(a);
  if(s==='B') return fichaSecB(b);
  if(s==='C') return fichaSecC(c);
  if(s==='D') return `<div class="fg"><label>Descripción del problema actual</label><textarea class="fi" id="fo_enfactual" rows="8" placeholder="Describa la enfermedad o problema actual del paciente, incluyendo síntomas, duración, evolución..." style="text-transform:uppercase" autocomplete="off">${d.d?.descripcion||''}</textarea><p style="font-size:10px;color:var(--tm);margin-top:4px">Incluya: síntomas principales, tiempo de evolución, factores agravantes o atenuantes.</p></div>`;
  if(s==='E') return fichaSecE(e);
  if(s==='F') return fichaSecF(f);
  if(s==='G') return fichaSecG(d.g||{});
  if(s==='H') return fichaSecH(h);
  if(s==='I') return fichaSecI(d.i||{});
  if(s==='J') return fichaSecJ(j);
  if(s==='K') return fichaSecK(k);
  if(s==='L') return fichaSecL(l);
  if(s==='M') return fichaSecM(m);
  if(s==='R') return fichaSecRetiro(d.r||{});
  if(s==='N') return fichaSecN(n);
  return '';
}

function fichaEmpChange(){
  const sel=document.getElementById('fo_empresa_sel');
  const inp=document.getElementById('fo_empresa');
  if(sel.value==='_nuevo'){inp.style.display='';inp.value='';inp.focus();
    document.getElementById('fo_ruc').value='';document.getElementById('fo_ruc_display').value='';
    document.getElementById('fo_ciiu').value='';document.getElementById('fo_ciiu_display').value='';
    document.getElementById('fo_centro').value='';document.getElementById('fo_centro_display').value='';return;}
  inp.style.display='none';
  inp.value=sel.value;
  const e=(S.empresas_cli||[]).find(x=>x.nombre===sel.value);
  if(e){
    document.getElementById('fo_ruc').value=e.ruc||'';document.getElementById('fo_ruc_display').value=e.ruc||'';
    document.getElementById('fo_ciiu').value=e.ciiu||'';document.getElementById('fo_ciiu_display').value=e.ciiu||'';
    document.getElementById('fo_centro').value=e.nombre||'';document.getElementById('fo_centro_display').value=e.nombre||'';
  }else{
    document.getElementById('fo_ruc').value='';document.getElementById('fo_ruc_display').value='';
    document.getElementById('fo_ciiu').value='';document.getElementById('fo_ciiu_display').value='';
    document.getElementById('fo_centro').value='';document.getElementById('fo_centro_display').value='';
  }
}

function calcIMC(){const p=parseFloat(gv('fo_peso')),t=parseFloat(gv('fo_talla'))/100;if(p>0&&t>0){const imc=(p/(t*t)).toFixed(1);document.getElementById('fo_imc').value=imc;let cl='Normal';if(imc<18.5)cl='Bajo peso';else if(imc<25)cl='Normal';else if(imc<30)cl='Sobrepeso';else if(imc<35)cl='Obesidad I';else if(imc<40)cl='Obesidad II';else cl='Obesidad III';document.getElementById('fo_cimc').value=cl;}}

  const hall=f.hallazgos||{};

  return`<p style="font-size:11px;color:var(--tm);margin-bottom:10px;background:var(--bg);padding:8px;border-radius:6px">ℹ️ Marcar con ✓ si existe patología y describir en Observaciones</p>

function fichaSecG(g){
  const cats=[
    {k:'fisicos',t:'FÍSICO',items:['Temperaturas altas','Temperaturas bajas','Radiación Ionizante','Radiación No Ionizante','Ruido','Vibración','Iluminación','Ventilación','Fluido eléctrico']},

      {st:'MECÁNICOS',items:['Atrapamiento entre máquinas y/o superficies','Atrapamiento entre objetos','Caída de objetos','Caídas al mismo nivel','Caídas a diferente nivel','Pinchazos','Cortes','Choques/colisión vehicular','Atropellamientos por vehículos','Proyección de fluidos','Proyección de partículas/fragmentos','Contacto con superficies de trabajo']},

    {k:'biologicos',t:'BIOLÓGICO',items:['Virus','Hongos','Bacterias','Parásitos','Exposición a vectores','Exposición a animales selváticos']},
    {k:'ergonomicos',t:'ERGONÓMICO',items:['Manejo manual de cargas','Movimientos repetitivos','Posturas forzadas','Trabajos con PVD','Diseño inadecuado del puesto']},
    {k:'psicosociales',t:'PSICOSOCIAL',items:['Monotonía del trabajo','Sobrecarga laboral','Minuciosidad de la tarea','Alta responsabilidad','Autonomía en la toma de decisiones','Supervisión y estilos de dirección deficiente','Conflicto de rol','Falta de claridad en las funciones','Incorrecta distribución del trabajo','Turnos rotativos','Relaciones interpersonales','Inestabilidad laboral','Amenaza delincuencial']}
  ];
  const hrs=[1,2,3,4,5,6,7];
  if(!g.riesgos)g.riesgos={};

  function renderCat(cat){
    let allItems=[];
    if(cat.sub){cat.sub.forEach(s=>{allItems.push({header:s.st});s.items.forEach(it=>allItems.push({item:it}));});}
    else{cat.items.forEach(it=>allItems.push({item:it}));}
    return`<div style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px"><div style="font-weight:700;font-size:12px;margin-bottom:6px">${cat.t}</div>
    <table style="width:100%;font-size:10px;border-collapse:collapse"><thead><tr><td style="width:55%"></td>${hrs.map(h=>`<th style="width:5%;text-align:center;padding:2px;font-size:9px">${h}</th>`).join('')}</tr></thead><tbody>
    ${allItems.map(a=>{
      if(a.header)return`<tr><td colspan="9" style="font-weight:700;font-size:10px;padding:4px 0;color:var(--tl)">${a.header}</td></tr>`;
      const rk=cat.k+'_'+a.item.replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
      return`<tr><td style="padding:3px 4px">${a.item}</td>${hrs.map(h=>{const ck=rk+'_h'+h;return`<td style="text-align:center;padding:2px"><input type="checkbox" ${(g.riesgos[ck])?'checked':''} onchange="FO.data.g.riesgos=FO.data.g.riesgos||{};FO.data.g.riesgos['${ck}']=this.checked" style="cursor:pointer">`;}).join('')}</tr>`;
    }).join('')}

    <div style="margin-top:4px;display:flex;gap:4px;align-items:center"><span style="font-size:10px;color:var(--tm)">Otros:</span><input class="fi" value="${g[cat.k+'_otros']||''}" onchange="FO.data.g['${cat.k}_otros']=this.value" placeholder="Especifique..." style="font-size:10px;flex:1"></div></div>`;
  }

  return cats.map(c=>renderCat(c)).join('')+`
  <div class="fg" style="margin-top:8px"><label style="font-weight:600">MEDIDAS PREVENTIVAS</label><textarea class="fi" id="fo_g_medidas" rows="3" style="text-transform:uppercase" autocomplete="off">${g.medidas||'USO DE PRENDAS DE PREVENCIÓN\nPAUSAS ACTIVAS\nCUMPLIMIENTO DE PROTOCOLOS DE BIOSEGURIDAD Y TRABAJO SEGURO'}</textarea></div>
  <button class="btn bsm" style="background:#e6fffa;color:#319795;border:1px dashed #319795;width:100%;margin-top:6px;font-size:11px" onclick="saveRiesgoPlantilla()">💾 Guardar como plantilla para este cargo</button>`;
}

function saveRiesgoPlantilla(){
  const p=gP(FO.pid);if(!p)return;
  const key='riesgo_tpl_'+(p.cargo||'general').replace(/\s/g,'_').toLowerCase();
  localStorage.setItem(key,JSON.stringify(FO.data.g));
  alert('✅ Plantilla de riesgos guardada para: '+(p.cargo||'General'));
}

  const key='riesgo_tpl_'+(cargo||'general').replace(/\s/g,'_').toLowerCase();

}

function fichaSecJ(j){
  if(!j.categorias)j.categorias=[];

    {nombre:'Electrocardiograma',items:['EKG 12 derivaciones']},{nombre:'Espirometría',items:['Espirometría']},

  const allCats=[...labCats,...otherCats];

  const ordCats=getOrdenCatsJ();
  ordCats.forEach(oc=>{if(!allCats.find(c=>c.nombre===oc.nombre)&&!usadas.includes(oc.nombre))allCats.push(oc);});

  j.categorias.forEach((cat,ci)=>{

    html+=`<div style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px">

      <button class="btn bsm bd" onclick="FO.data.j.categorias.splice(${ci},1);rerenderJ()" style="font-size:10px">✕</button>

    (cat.items||[]).forEach((item,ii)=>{
      html+=`<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">

      <input class="fi" id="exv_${ci}_${ii}" value="${item.valor||''}" onchange="FO.data.j.categorias[${ci}].items[${ii}].valor=this.value" placeholder="Valor" style="font-size:11px;width:80px;text-align:center" onkeydown="if(event.key==='Enter'){event.preventDefault();var nxt=document.getElementById('exv_${ci}_${ii+1}');if(nxt)nxt.focus();}">
      <input class="fi" value="${item.unidad||''}" onchange="FO.data.j.categorias[${ci}].items[${ii}].unidad=this.value;saveExamUnit('${item.nombre.replace(/'/g,"\\'")}',this.value)" style="font-size:10px;width:60px;color:var(--tm)" title="Unidad (editable)">
      <button class="btn bsm bd" onclick="FO.data.j.categorias[${ci}].items.splice(${ii},1);rerenderJ()" style="font-size:9px;padding:1px 4px">✕</button></div>`;
    });
    html+=`<input class="fi" placeholder="+ Agregar examen manual..." onkeydown="if(event.key==='Enter'&&this.value){addExamItemManual(${ci},this.value);this.value='';}" style="font-size:10px;margin-top:4px;border-style:dashed"></div>`;

  return html;

function getOrdenCatsJ(){

function addRecCustom(){

  const isRetiro=(FO.data.b||{}).tipo_eval==='RETIRO';

  if(!S[key])S[key]=[];
  if(!S[key].includes(v)){S[key].push(v);saveRecsCustom(key,S[key]);}

async function saveRecsCustom(key,arr){
  try{
    const existing=await SB.get('configuracion',`select=*&clave=eq.${key}`);
    if(existing&&existing.length){await SB.patch('configuracion',{valor:JSON.stringify(arr)},`clave=eq.${key}`);}
    else{await SB.post('configuracion',{clave:key,valor:JSON.stringify(arr)});}
  }catch(e){console.error('Error guardando recs:',e);}
}
async function loadRecsCustom(){
  try{
    const r1=await SB.get('configuracion',`select=*&clave=eq.recs_custom`);
    if(r1&&r1[0])S.recs_custom=JSON.parse(r1[0].valor)||[];
    const r2=await SB.get('configuracion',`select=*&clave=eq.recs_retiro`);
    if(r2&&r2[0])S.recs_retiro=JSON.parse(r2[0].valor)||[];
  }catch(e){console.error('Error cargando recs:',e);}
}
function removeRecCustom(key,idx){

}

// Quitar acentos para búsqueda
function noAc(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();}

// Búsqueda dinámica CIUO
function searchCIUO(inputId,resId){
  const q=noAc(document.getElementById(inputId)?.value||'');
  const box=document.getElementById(resId);if(!box)return;
  if(q.length<2){box.style.display='none';return;}
  const matches=(S.cargos_ciuo||[]).filter(c=>noAc(c.codigo+' '+c.nombre).includes(q)).slice(0,15);
  if(!matches.length){box.style.display='none';return;}
  const rect=document.getElementById(inputId).getBoundingClientRect();
  box.style.cssText=`position:fixed;z-index:9999;background:#fff;border:2px solid #2b6cb0;border-radius:8px;max-height:200px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.3);left:${rect.left}px;top:${rect.bottom+2}px;width:${rect.width}px`;
  box.innerHTML=matches.map(c=>`<div style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #e2e8f0;color:#1a202c" onmouseover="this.style.background='#ebf4ff'" onmouseout="this.style.background='#fff'" onmousedown="document.getElementById('${inputId}').value='(${c.codigo}) ${c.nombre}';document.getElementById('${resId}').style.display='none'"><span style="color:#2b6cb0;font-weight:700;margin-right:6px">${c.codigo}</span>${c.nombre}</div>`).join('');
  box.style.display='block';
  document.getElementById(inputId).onblur=()=>setTimeout(()=>box.style.display='none',200);
}

  const payload={
    paciente_id:FO.pid,medico_id:S.u?.id,fecha:d.b?.fecha_atencion||TD,tipo_eval:d.b?.tipo_eval||'INGRESO',
    seccion_a:d.a||{},seccion_b:d.b||{},seccion_c:d.c||{},seccion_d:d.d||{},seccion_e:d.e||{},seccion_f:d.f||{},seccion_g:d.g||{},seccion_h:d.h||{},seccion_i:d.i||{},seccion_j:d.j||{},seccion_k:d.k||{},seccion_l:d.l||{},seccion_m:d.m||{},seccion_n:d.n||{},seccion_r:d.r||{},
    aptitud:d.l?.aptitud||'',estado:'finalizado',updated_at:new Date().toISOString()
  };
  if(DB_OK){
    try{
      let ok=false;
      if(FO.fid){
        const r=await SB.patch('fichas_ocupacionales',payload,`id=eq.${FO.fid}`);
        ok=!!r;
      }else{
        const r=await SB.post('fichas_ocupacionales',payload);
        if(r&&r[0]){FO.fid=r[0].id;ok=true;}
      }
      if(!ok){alert('❌ Error al finalizar. Verifica la conexión.');return;}
      // Marcar la orden como completada
      const ord=S.ord.find(o=>o.pid===FO.pid&&(o.cat==='ficha_ocupacional'||o.cat==='atencion_medica')&&o.estado!=='completado');
      if(ord){await updO(ord.id,{estado:'completado'});}
      // Agregar a S.fichas para que aparezca en Fichas Finalizadas sin recargar
      const pa=S.pts.find(p=>p.id===FO.pid);
      const nuevaFicha={id:FO.fid,pid:FO.pid,fecha:d.b?.fecha_atencion||TD,tipo:d.b?.tipo_eval||'INGRESO',aptitud:d.l?.aptitud||'',estado:'finalizado',empresa:(d.a||{}).empresa||pa?.empresa||'',updated_at:new Date().toISOString()};
      S.fichas=S.fichas.filter(f=>f.id!==FO.fid);
      S.fichas.unshift(nuevaFicha);
      alert('✅ Ficha FINALIZADA y bloqueada correctamente.');
      S.medTab='finalizadas';
      nav('medord');
    }catch(e){alert('❌ Error: '+e.message);}
  }else{
    // Sin Supabase: solo marcar en memoria
    const ord=S.ord.find(o=>o.pid===FO.pid&&(o.cat==='ficha_ocupacional'||o.cat==='atencion_medica'));
    if(ord)ord.estado='completado';
    alert('⚠️ Sin conexión a Supabase. Ficha marcada como finalizada en memoria.');
    nav('medord');
  }
}
function guardarMedico(){
  const nombre=gv('fo_medico')?.trim(),codigo=gv('fo_codmed')?.trim();
  if(!nombre||!codigo){alert('Ingrese nombre y código del médico');return;}
  const list=JSON.parse(localStorage.getItem('vw_medicos_list')||'[]');
  if(list.find(m=>m.nombre===nombre&&m.codigo===codigo)){alert('Este médico ya está guardado');return;}
  const firma=getMedCfg().firma||'';
  list.push({nombre,codigo,firma});
  localStorage.setItem('vw_medicos_list',JSON.stringify(list));
  localStorage.setItem('mediagenda_med_cfg',JSON.stringify({...getMedCfg(),nombre,codigo}));
  FO.data.n={medico:nombre,codigo:codigo};
  render();
}

function subirFirma(){
  // Usar input fijo en el DOM para evitar bloqueo del navegador
  const inp = document.getElementById('input_firma_file');
  if(inp){ inp.value=''; inp.click(); }
}

async function procesarFirmaSeleccionada(inp){
  const file = inp.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024){ alert('La imagen es muy grande. Máximo 2MB.'); return; }
  const reader = new FileReader();
  reader.onload = async ev => {
    const base64 = ev.target.result;
    // Guardar en memoria
    if(S.u) S.u.firma = base64;
    localStorage.setItem('mediagenda_med_cfg', JSON.stringify({...getMedCfg(), firma:base64}));
    // Backup por cedula (garantizado)
    if(S.u?.cedula) localStorage.setItem('vw_firma_'+S.u.cedula, base64);
    // Guardar en Supabase
    if(DB_OK && S.u?.id){
      try{
        await SB.patch('usuarios', {firma:base64}, `id=eq.${S.u.id}`);
        alert('✅ Firma guardada en servidor');
      }catch(e){ alert('✅ Firma guardada localmente (error: '+e.message+')'); }
    } else {
      alert('✅ Firma guardada localmente');
    }
    render();
  };
  reader.readAsDataURL(file);
}

function eliminarFirma(){
  if(!confirm('¿Eliminar la firma/sello guardado?'))return;
  if(S.u)delete S.u.firma;
  const cfg={...getMedCfg()};delete cfg.firma;
  localStorage.setItem('mediagenda_med_cfg',JSON.stringify(cfg));
  if(DB_OK&&S.u?.id)SB.patch('usuarios',{firma:null},`id=eq.${S.u.id}`);
  if(S.u?.cedula)localStorage.removeItem('vw_firma_'+S.u.cedula);
  render();
}

function getFirmaActual(){
  // Prioridad 1: S.u.firma (Supabase)
  if(S.u?.firma)return S.u.firma;
  // Prioridad 2: localStorage backup por cedula
  if(S.u?.cedula){
    try{
      const k='vw_firma_'+S.u.cedula;
      const f=localStorage.getItem(k);
      if(f){S.u.firma=f;return f;}
    }catch(e){}
  }
  // Prioridad 3: legacy
  return getMedCfg().firma||'';
}

      {label:'M. Recomendaciones',y:73,h:9},
      {label:'N. Datos Profesional ← FIRMA AQUÍ',y:82,h:18,highlight:true},

        <span style="font-size:7px;color:${s.highlight?'#3182ce':'#ccc'};padding:1px 3px;font-weight:${s.highlight?'700':'400'}">${s.label}</span>

    const secs=[
      {label:'Texto del documento',y:0,h:75},

    secs.forEach(s=>{

        <span style="font-size:7px;color:${s.highlight?'#3182ce':'#ccc'};padding:1px 3px;font-weight:${s.highlight?'700':'400'}">${s.label}</span>
      </div>`;

  }

  openModal(`<div class="mhd">
    <h3>📐 Posición firma — ${docLabel}</h3>
    <button class="btn bic bg" onclick="closeModal()">${ic('x')}</button>

    <div style="flex-shrink:0">

      ${dc.pagesLabel?`<div style="font-size:9px;color:var(--tm);margin-bottom:4px">ℹ️ ${dc.pagesLabel}</div>`:''}
      <div style="font-size:9px;color:#38a169;margin-bottom:6px">🎯 ${dc.firmaLabel}</div>
      <div style="display:flex">
        <!-- Regla vertical -->
        <div style="width:16px;height:${H}px;position:relative;background:#f7f7f7;border:1px solid #ddd;border-right:none;flex-shrink:0;overflow:hidden">
          ${Array.from({length:Math.floor(dc.mmH/50)+1},(_,i)=>i*50).map(m=>`<div style="position:absolute;top:${Math.round(m*scaleY)}px;right:1px;font-size:5px;color:#bbb;line-height:1">${m}</div>`).join('')}
          ${Array.from({length:Math.floor(dc.mmH/10)+1},(_,i)=>i*10).map(m=>`<div style="position:absolute;top:${Math.round(m*scaleY)}px;right:0;width:${m%50===0?8:4}px;height:1px;background:#ccc"></div>`).join('')}
        </div>
        <div>
          <!-- Regla horizontal -->
          <div style="height:16px;width:${W}px;position:relative;background:#f7f7f7;border:1px solid #ddd;border-bottom:none;overflow:hidden">
            ${Array.from({length:Math.floor(dc.mmW/50)+1},(_,i)=>i*50).map(m=>`<div style="position:absolute;left:${Math.round(m*scaleX)}px;bottom:1px;font-size:5px;color:#bbb">${m}mm</div>`).join('')}
            ${Array.from({length:Math.floor(dc.mmW/10)+1},(_,i)=>i*10).map(m=>`<div style="position:absolute;left:${Math.round(m*scaleX)}px;bottom:0;height:${m%50===0?8:4}px;width:1px;background:#ccc"></div>`).join('')}

            ${zonas}
            ${hMarks.join('')}${vMarks.join('')}
            <!-- Firma arrastrable -->
            <img id="firma_drag" src="${firma}"
              style="position:absolute;left:${finalPos.x}px;top:${finalPos.y}px;width:${finalPos.w}px;height:${finalPos.h}px;object-fit:contain;cursor:move;border:2px dashed #3182ce;border-radius:3px;background:rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(49,130,206,.3);z-index:10"

        <label style="font-size:10px">Alto: <b><span id="lbl_h">${finalPos.h}</span>px</b></label>
        <input type="range" id="ctrl_h" min="15" max="200" value="${finalPos.h}" oninput="document.getElementById('lbl_h').textContent=this.value;actualizarFirmaDrag()" style="width:100%;margin:4px 0">

      <div style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="font-size:11px;font-weight:600;margin-bottom:8px">🕹️ Mover</div>
        <div style="display:grid;grid-template-columns:repeat(3,34px);gap:4px;justify-content:center;margin-bottom:4px">
          <div></div>
          <button class="btn bsm" style="padding:5px;font-size:15px" onmousedown="startMover(0,-1)" onmouseup="stopMover()" ontouchstart="startMover(0,-1)" ontouchend="stopMover()">↑</button>

          <button class="btn bsm" style="padding:5px;font-size:15px" onmousedown="startMover(-1,0)" onmouseup="stopMover()" ontouchstart="startMover(-1,0)" ontouchend="stopMover()">←</button>
          <button class="btn bsm" style="padding:5px;font-size:9px;background:#e2e8f0" onclick="centrarFirma()">◎</button>
          <button class="btn bsm" style="padding:5px;font-size:15px" onmousedown="startMover(1,0)" onmouseup="stopMover()" ontouchstart="startMover(1,0)" ontouchend="stopMover()">→</button>
          <div></div>
          <button class="btn bsm" style="padding:5px;font-size:15px" onmousedown="startMover(0,1)" onmouseup="stopMover()" ontouchstart="startMover(0,1)" ontouchend="stopMover()">↓</button>
          <div></div>
        </div>
        <div style="font-size:9px;color:var(--tm);text-align:center">Flechas del teclado • Shift = ×10</div>
      </div>
      <div style="background:var(--bg);border-radius:8px;padding:8px;margin-bottom:8px;font-size:10px">
        📍 X:<b><span id="lbl_x">${finalPos.x}</span></b> Y:<b><span id="lbl_y">${finalPos.y}</span></b> px
      </div>
      <button class="btn bp" style="width:100%;margin-bottom:6px" onclick="guardarPosicionFirma('${doc}')">💾 Guardar posición</button>

    const hoja=document.getElementById('hoja_preview');
    const img=document.getElementById('firma_drag');
    if(!hoja||!img)return;
    function updateLabels(){
      document.getElementById('lbl_x').textContent=img.offsetLeft;
      document.getElementById('lbl_y').textContent=img.offsetTop;
    }
    // DRAG con mouse
    let dragging=false,ox=0,oy=0;
    img.addEventListener('mousedown',e=>{
      dragging=true;
      ox=e.clientX-img.offsetLeft; oy=e.clientY-img.offsetTop;
      img.style.border='2px solid #3182ce';
      e.preventDefault();
    });
    document.addEventListener('mousemove',e=>{
      if(!dragging)return;
      const hr=hoja.getBoundingClientRect();
      let nx=e.clientX-hr.left-ox;
      let ny=e.clientY-hr.top-oy;
      nx=Math.max(0,Math.min(nx,hoja.offsetWidth-img.offsetWidth));
      ny=Math.max(0,Math.min(ny,hoja.offsetHeight-img.offsetHeight));
      img.style.left=nx+'px'; img.style.top=ny+'px';
      updateLabels();
    });
    document.addEventListener('mouseup',()=>{dragging=false;img.style.border='2px dashed #3182ce';});
    // TECLADO
    hoja.focus();
    hoja.addEventListener('keydown',e=>{
      const step=e.shiftKey?10:1;
      let nx=img.offsetLeft,ny=img.offsetTop;
      if(e.key==='ArrowLeft')nx-=step;
      else if(e.key==='ArrowRight')nx+=step;
      else if(e.key==='ArrowUp')ny-=step;
      else if(e.key==='ArrowDown')ny+=step;
      else return;
      e.preventDefault();
      nx=Math.max(0,Math.min(nx,hoja.offsetWidth-img.offsetWidth));
      ny=Math.max(0,Math.min(ny,hoja.offsetHeight-img.offsetHeight));
      img.style.left=nx+'px'; img.style.top=ny+'px';
      updateLabels();
    });
    // BOTONES continuo
    window._moverInterval=null;
    window.startMover=(dx,dy)=>{stopMover();window._moverInterval=setInterval(()=>{
      let nx=img.offsetLeft+dx,ny=img.offsetTop+dy;
      nx=Math.max(0,Math.min(nx,hoja.offsetWidth-img.offsetWidth));
      ny=Math.max(0,Math.min(ny,hoja.offsetHeight-img.offsetHeight));
      img.style.left=nx+'px';img.style.top=ny+'px';updateLabels();
    },30);};
    window.stopMover=()=>clearInterval(window._moverInterval);
    window.centrarFirma=()=>{img.style.left=Math.round((hoja.offsetWidth-img.offsetWidth)/2)+'px';updateLabels();};
  },150);
}

function actualizarFirmaDrag(){
  const img=document.getElementById('firma_drag');
  if(!img)return;
  img.style.width=document.getElementById('ctrl_w').value+'px';
  img.style.height=document.getElementById('ctrl_h').value+'px';
}

function guardarPosicionFirma(doc){
  const img=document.getElementById('firma_drag');
  const hoja=document.getElementById('hoja_preview');
  if(!img||!hoja)return;
  const x=img.offsetLeft, y=img.offsetTop;
  const xp=Math.round((x/hoja.offsetWidth)*100);
  const yp=Math.round((y/hoja.offsetHeight)*100);
  const w=+document.getElementById('ctrl_w').value;
  const h=+document.getElementById('ctrl_h').value;
  const cfg=getFirmaCfg();
  cfg['pos_'+doc]={x,y,xp,yp,w,h};
  // Guardar en memoria y persistir
  if(S.u)S.u.firma_cfg=cfg;
  localStorage.setItem('vw_firma_cfg',JSON.stringify(cfg));
  if(DB_OK&&S.u?.id){
    SB.patch('usuarios',{firma_cfg:cfg},`id=eq.${S.u.id}`)
      .then(()=>alert('✅ Posición guardada en servidor — '+(doc==='cert'?'Certificado':doc==='ficha'?'Ficha':'Confidencialidad')))
      .catch(()=>alert('✅ Posición guardada localmente'));
  }else{
    alert('✅ Posición guardada — '+(doc==='cert'?'Certificado':doc==='ficha'?'Ficha':'Confidencialidad'));
  }
  closeModal();
  render();
}

function resetPosicionFirma(doc){
  const cfg=getFirmaCfg();
  delete cfg['pos_'+doc];
  if(S.u)S.u.firma_cfg=cfg;
  localStorage.setItem('vw_firma_cfg',JSON.stringify(cfg));
  if(DB_OK&&S.u?.id)SB.patch('usuarios',{firma_cfg:cfg},`id=eq.${S.u.id}`);
  closeModal();
  setTimeout(()=>abrirConfigFirma(doc),100);
}
function getFirmaCfg(){
  // Prioridad: S.u.firma_cfg (Supabase) → localStorage (fallback)
  if(S.u?.firma_cfg&&typeof S.u.firma_cfg==='object'&&Object.keys(S.u.firma_cfg).length>0)
    return S.u.firma_cfg;
  try{const v=localStorage.getItem('vw_firma_cfg');if(v)return JSON.parse(v);}catch(e){}
  return {cert:true,ficha:true,conf:true};
}

function saveFirmaCfg(){
  const prev=getFirmaCfg();
  const ec=document.getElementById('firma_cert');
  const ef=document.getElementById('firma_ficha');
  const eco=document.getElementById('firma_conf');
  const cfg={...prev,
    cert:ec?ec.checked:prev.cert!==false,
    ficha:ef?ef.checked:prev.ficha!==false,
    conf:eco?eco.checked:prev.conf!==false
  };
  if(S.u)S.u.firma_cfg=cfg;
  localStorage.setItem('vw_firma_cfg',JSON.stringify(cfg));
  if(DB_OK&&S.u?.id)SB.patch('usuarios',{firma_cfg:cfg},`id=eq.${S.u.id}`);
  alert('✅ Configuración guardada');
}

function getFirmaDoc(doc){
  const cfg=getFirmaCfg();
  if(!cfg[doc])return null;
  const img=getFirmaActual();

}

function firmaOverlayStyle(doc){
  // Retorna CSS para posicionar la firma como overlay absoluto en la página impresa
  const f=getFirmaDoc(doc);
  if(!f)return '';
  const p=f.pos;
  // El configurador usa escala sobre hoja de pantalla
  // Convertir px de pantalla a % de página para impresión
  // Hoja pantalla: cert=480×339px (297×210mm), ficha/conf=339×480px (210×297mm)
  const hojaW = doc==='cert'?480:339;
  const hojaH = doc==='cert'?339:480;
  const xPct = Math.round((p.x/hojaW)*100*10)/10;
  const yPct = Math.round((p.y/hojaH)*100*10)/10;
  const wPct = Math.round((p.w/hojaW)*100*10)/10;
  const hPct = Math.round((p.h/hojaH)*100*10)/10;
  return `position:absolute;left:${xPct}%;top:${yPct}%;width:${wPct}%;height:${hPct}%;object-fit:contain;z-index:100`;
}

async function generarConfidencialidad(){
  saveFichaSection();
  const d=FO.data,p=gP(FO.pid)||{},a=d.a||{},b=d.b||{},n=d.n||{};
  const medNom=document.getElementById('fo_medico')?.value||n.medico||'';
  const medCod=document.getElementById('fo_codmed')?.value||n.codigo||'';
  const payload={
    medico: medNom,
    cedula_medico: medCod,
    cargo: 'Médico Ocupacional',
    empresa: a.empresa||p.empresa||'',
    ciudad: p.ciudad||'Machala',
    fecha: b.fecha_atencion||TD,
    firma: getFirmaDoc('conf')?.img||''
  };
  const btn=event?.target;
  if(btn){btn.disabled=true;btn.textContent='⏳ Generando...';}
  try{
    const res=await fetch('https://vitalwork-pdf-service.onrender.com/generar-confidencialidad',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!res.ok){const err=await res.json().catch(()=>({}));alert('❌ Error: '+(err.error||res.statusText));return;}
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const link=document.createElement('a');
    link.href=url;link.download=`CONFIDENCIALIDAD_${medNom.replace(/\s+/g,'_')}.docx`;
    link.click();URL.revokeObjectURL(url);
  }catch(e){alert('❌ Error de conexión: '+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent='🔒 Confidencialidad';}}
}

  // L. Aptitud

  pg3+=`<tr><td colspan="33" class="sec">O. DATOS DEL PROFESIONAL</td><td colspan="29" class="sec">P. FIRMA DEL TRABAJADOR</td></tr>

async function verHistorialFichas(){
  if(!FO.pid){alert('No hay paciente seleccionado');return;}
  const p=gP(FO.pid)||{};
  let fichas=[];

    fichas=await SB.get('fichas_ocupacionales',`select=id,fecha,tipo_eval,aptitud,estado,created_at&paciente_id=eq.${FO.pid}&order=created_at.desc`)||[];
  }
  const tipoIcon={'INGRESO':'🟢','PERIÓDICO':'🔵','REINTEGRO':'🟡','RETIRO':'🔴'};
  const lista=fichas.length?fichas.map((f,i)=>{

      <div style="flex:1">
        <div style="font-weight:600;font-size:13px">${f.tipo_eval||'INGRESO'} ${activa?'<span style="color:#2b6cb0;font-size:10px">← ACTUAL</span>':''}</div>
